<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>X-Stream Engine Ultra Universal Supremo</title>

<!-- BIBLIOTECAS DE SUPORTE TOTAL A STREAMING (HLS & MPEG-DASH) -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
/* OTIMIZAÇÃO ABSOLUTA DE GPU E RAM PARA SMART TV */
html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #fff;
    -webkit-user-select: none;
    user-select: none;
    outline: none; /* Remove borda de foco visual */
}

#mediaVideo, #mediaAudio, #mediaImage {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000; 
    object-fit: contain;
    display: none; 
    transform: translateZ(0);
    will-change: transform;
    backface-visibility: hidden;
}

#mediaVideo { z-index: 10; }
#mediaAudio { z-index: 12; background: #111; } /* Tela preta elegante para reprodução de áudio puro */
#mediaImage { z-index: 15; }

/* INDICADOR DISCRETO LEVE */
#statusBadge {
    position: fixed; top: 20px; left: 20px;
    z-index: 9999; display: flex; align-items: center; gap: 8px;
    background: rgba(0, 0, 0, 0.7); padding: 5px 12px;
    border-radius: 15px;
}

.dot { width: 9px; height: 9px; border-radius: 50%; }
.statusText { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #fff; }

#statusBadge.offline .dot { background: #ff3333; }
#statusBadge.live .dot { background: #00ff66; }

/* FEEDBACK VISUAL INSTANTÂNEO DE COMANDOS */
#keyDebug {
    position: fixed; top: 20px; right: 20px;
    background: rgba(255, 107, 0, 0.9); color: white;
    padding: 8px 16px; border-radius: 8px; font-weight: bold;
    z-index: 10000; display: none; font-size: 13px;
}

#errorBox {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; background: #000;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; z-index: 20000;
}
#errorTitle { font-size: 35px; color: #ff3333; margin-bottom: 15px; }
#errorMessage { font-size: 18px; max-width: 80%; color: #aaa; }
</style>
</head>

<body tabindex="0" id="appBody">

<div id="keyDebug"></div>

<div id="statusBadge" class="offline">
    <span class="dot"></span>
    <span id="statusText" class="statusText">OFFLINE</span>
</div>

<video id="mediaVideo" autoplay playsinline webkit-playsinline preload="auto" crossorigin="anonymous"></video>
<audio id="mediaAudio" autoplay preload="auto" crossorigin="anonymous"></audio>
<img id="mediaImage" alt="Media Image">

<div id="errorBox">
    <div id="errorTitle">Aviso de Mídia</div>
    <div id="errorMessage">Formato indisponível ou stream offline.</div>
</div>

<script>
// CONFIGURAÇÃO DE ENDEREÇOS
var SERVER_URL = (window.location.origin && window.location.origin.startsWith("http"))
    ? window.location.origin 
    : "https://x-stream-56ya.onrender.com";
var WS_URL = SERVER_URL.replace("http://", "ws://").replace("https://", "wss://");

var mediaVideo = document.getElementById("mediaVideo");
var mediaAudio = document.getElementById("mediaAudio");
var mediaImage = document.getElementById("mediaImage");
var statusBadge = document.getElementById("statusBadge");
var statusText = document.getElementById("statusText");
var keyDebug = document.getElementById("keyDebug");
var appBody = document.getElementById("appBody");

var tipoAtual = "";
var urlAtual = "";
var ultimaURL = "";
var hlsPlayer = null;
var dashPlayer = null;
var debugTimeout = null;
var wsConnection = null;
var ultimoComandoIdProcessado = 0;
var pingInterval = null;

// GARANTE FOCO PERMANENTE NA TV PARA O CONTROLE FUNCIONAR
function garantirFoco() {
    if(appBody) {
        appBody.focus();
    }
}
window.onload = garantirFoco;
document.addEventListener("click", garantirFoco);
setInterval(garantirFoco, 3000); // Reforça o foco a cada 3s caso o navegador da TV tente roubá-lo

function showDebug(msg) {
    keyDebug.innerText = msg;
    keyDebug.style.display = "block";
    clearTimeout(debugTimeout);
    debugTimeout = setTimeout(function(){ keyDebug.style.display = "none"; }, 1200);
}

function atualizarStatus(isLive){
    if(isLive){
        statusBadge.className = "live";
        statusText.innerHTML = "LIVE";
    } else {
        statusBadge.className = "offline";
        statusText.innerHTML = "OFFLINE";
    }
}

function mostrarErro(msg){
    var box = document.getElementById("errorBox");
    if(box){
        box.style.display = "flex";
        var texto = document.getElementById("errorMessage");
        if(texto) texto.innerHTML = msg;
    }
}

// LIMPEZA PROFUNDA DE RAM E RECURSOS DE MÍDIA
function limparMidia(){
    atualizarStatus(false);

    if (hlsPlayer) {
        try { hlsPlayer.destroy(); } catch(e){}
        hlsPlayer = null;
    }

    if (dashPlayer) {
        try { dashPlayer.reset(); } catch(e){}
        dashPlayer = null;
    }

    try {
        mediaVideo.pause();
        mediaVideo.removeAttribute("src");
        mediaVideo.load();
    } catch(e){}

    try {
        mediaAudio.pause();
        mediaAudio.removeAttribute("src");
        mediaAudio.load();
    } catch(e){}

    try {
        mediaImage.removeAttribute("src");
    } catch(e){}
}

// SELETOR UNIVERSAL DE MÍDIA (VÍDEO, ÁUDIO, IMAGEM)
function receberMidia(url, tempoInicial){
    if(!url || url === urlAtual) return;
    urlAtual = url;
    limparMidia();

    var urlLimpa = url.split('?')[0].toLowerCase();

    // Verificação de Imagens (JPG, PNG, GIF, WEBP, BMP, SVG)
    if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i.test(urlLimpa)) {
        iniciarImagem(url);
    } 
    // Verificação de Áudios (MP3, AAC, WAV, OGG, FLAC, M4A, WMA)
    else if (/\.(mp3|aac|wav|ogg|flac|m4a|wma)$/i.test(urlLimpa)) {
        iniciarAudio(url);
    } 
    // Streams HLS (.m3u8)
    else if (urlLimpa.endsWith('.m3u8')) {
        iniciarHLS(url, tempoInicial);
    } 
    // Streams DASH (.mpd)
    else if (urlLimpa.endsWith('.mpd')) {
        iniciarDASH(url, tempoInicial);
    } 
    // Vídeos Padrão (MP4, WebM, MKV, MOV, etc.)
    else {
        iniciarVideoPadrao(url, tempoInicial);
    }
}

function iniciarHLS(url, tempoInicial) {
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        hlsPlayer = new Hls({
            enableWorker: false,
            maxBufferLength: 8,
            maxMaxBufferLength: 15,
            liveSyncDurationCount: 3,
            lowLatencyMode: true
        });
        hlsPlayer.loadSource(url);
        hlsPlayer.attachMedia(mediaVideo);
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
            tipoAtual = "video";
            mostrarVideo();
            executarPlayComTempo(tempoInicial);
        });
        hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) { iniciarVideoPadrao(url, tempoInicial); }
        });
    } else if (mediaVideo.canPlayType('application/vnd.apple.mpegurl')) {
        mediaVideo.src = url;
        iniciarVideoPadrao(url, tempoInicial);
    } else {
        iniciarVideoPadrao(url, tempoInicial);
    }
}

function iniciarDASH(url, tempoInicial) {
    if (typeof dashjs !== 'undefined') {
        try {
            dashPlayer = dashjs.MediaPlayer().create();
            dashPlayer.initialize(mediaVideo, url, true);
            tipoAtual = "video";
            mostrarVideo();
            if(tempoInicial > 0) mediaVideo.currentTime = Number(tempoInicial);
            atualizarStatus(true);
        } catch(e) {
            iniciarVideoPadrao(url, tempoInicial);
        }
    } else {
        iniciarVideoPadrao(url, tempoInicial);
    }
}

function iniciarVideoPadrao(url, tempoInicial){
    var confirmado = false;
    mediaVideo.src = url;
    mediaVideo.load();

    function ativar(){
        if(confirmado) return;
        confirmado = true;
        tipoAtual = "video";
        mostrarVideo();
        executarPlayComTempo(tempoInicial);
    }

    mediaVideo.onloadeddata = ativar;
    mediaVideo.oncanplay = ativar;
    mediaVideo.onerror = function(){
        if(!confirmado) iniciarAudio(url);
    };
}

function iniciarAudio(url){
    var confirmado = false;
    mediaAudio.src = url;
    mediaAudio.load();
    mediaAudio.oncanplay = function(){
        if(confirmado) return;
        confirmado = true;
        tipoAtual = "audio";
        mostrarAudio();
        mediaAudio.play().then(function(){
            atualizarStatus(true);
        }).catch(function(){});
    };
    mediaAudio.onerror = function(){
        if(!confirmado) iniciarImagem(url);
    };
}

function iniciarImagem(url){
    var img = new Image();
    img.onload = function(){
        tipoAtual = "image";
        mediaImage.src = url;
        mostrarImagem();
        atualizarStatus(true);
    };
    img.onerror = function(){
        atualizarStatus(false);
        mostrarErro("Formato de arquivo não suportado.");
    };
    img.src = url;
}

function esconderTodos(){
    mediaVideo.style.display = "none";
    mediaAudio.style.display = "none";
    mediaImage.style.display = "none";
    var box = document.getElementById("errorBox");
    if(box) box.style.display = "none";
}

function mostrarVideo(){ esconderTodos(); mediaVideo.style.display = "block"; }
function mostrarAudio(){ esconderTodos(); mediaAudio.style.display = "block"; }
function mostrarImagem(){ esconderTodos(); mediaImage.style.display = "block"; }

function executarPlayComTempo(tempoInicial){
    if(tempoInicial && tempoInicial > 0){
        try { mediaVideo.currentTime = Number(tempoInicial); } catch(e){}
    }
    var p = mediaVideo.play();
    if(p !== undefined){
        p.then(function(){
            atualizarStatus(true);
        }).catch(function(){
            setTimeout(function(){ executarPlayComTempo(tempoInicial); }, 400);
        });
    }
}

mediaVideo.onplaying = function() { atualizarStatus(true); };
mediaVideo.onpause = function() { atualizarStatus(false); };
mediaVideo.onended = function(){ enviarComando("next_track"); };

mediaAudio.onplaying = function() { atualizarStatus(true); };
mediaAudio.onpause = function() { atualizarStatus(false); };
mediaAudio.onended = function(){ enviarComando("next_track"); };

// ==========================================
// PROCESSAMENTO DO ESTADO DO SERVIDOR
// ==========================================
function processarEstadoServidor(dados) {
    var url = "";
    if(dados.fila && dados.fila.length > 0 && dados.fila[dados.atual]){
        url = dados.fila[dados.atual].url;
    }
    if(!url && dados.video){ url = dados.video; }

    if((dados.ativo || dados.playing !== false) && url){
        if(url !== ultimaURL){
            ultimaURL = url;
            receberMidia(url, dados.currentTime || 0);
        }
    } else if (!dados.ativo && !dados.playing && !dados.video) {
        if(urlAtual !== ""){
            urlAtual = ""; 
            ultimaURL = "";
            limparMidia();
            esconderTodos();
            atualizarStatus(false);
        }
    }

    var midiaAtiva = (tipoAtual === "audio") ? mediaAudio : mediaVideo;
    if(midiaAtiva && tipoAtual !== "image"){
        var isPlaying = (dados.playing !== undefined) ? dados.playing : dados.reproduzindo;

        if(isPlaying === false && !midiaAtiva.paused){
            midiaAtiva.pause();
        } else if(isPlaying === true && midiaAtiva.paused){
            midiaAtiva.play().catch(function(){});
        }

        if(dados.volume !== undefined){ midiaAtiva.volume = dados.volume / 100; }
        if(dados.mudo !== undefined){ midiaAtiva.muted = dados.mudo; }

        if(dados.seek && dados.seek !== 0 && dados.comandoId !== ultimoComandoIdProcessado){
            ultimoComandoIdProcessado = dados.comandoId;
            var novoTempo = midiaAtiva.currentTime + dados.seek;
            midiaAtiva.currentTime = Math.max(0, Math.min(novoTempo, midiaAtiva.duration || 0));
            enviarComando("seek_reset");
        }
    }

    if(dados.ultimoComando && dados.comandoId !== ultimoComandoIdProcessado){
        ultimoComandoIdProcessado = dados.comandoId;
        showDebug("📱 " + dados.ultimoComando.toUpperCase());
    }
}

// ==========================================
// CONEXÃO WEBSOCKET COM HEARTBEAT
// ==========================================
function iniciarWebSocket() {
    try {
        wsConnection = new WebSocket(WS_URL);
        
        wsConnection.onopen = function() {
            clearInterval(pingInterval);
            pingInterval = setInterval(function(){
                if(wsConnection && wsConnection.readyState === 1){
                    wsConnection.send(JSON.stringify({ tipo: "sync-request" }));
                }
            }, 25000);
        };

        wsConnection.onmessage = function(event) {
            try {
                var dados = JSON.parse(event.data);
                processarEstadoServidor(dados);
            } catch(e){}
        };

        wsConnection.onclose = function() {
            clearInterval(pingInterval);
            setTimeout(iniciarWebSocket, 4000);
        };
    } catch(e) {
        setTimeout(iniciarWebSocket, 4000);
    }
}

iniciarWebSocket();

function enviarComando(acao){
    var xhr = new XMLHttpRequest();
    xhr.open("POST", SERVER_URL + "/controle", true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify({ acao: acao }));
}

// ==========================================
// CONTROLE REMOTO DA TV - ESCUTA GLOBAL BLINDADA
// ==========================================
window.addEventListener("keydown", function(e) {
    garantirFoco(); // Força o foco em cada toque no controle
    var key = e.keyCode || e.which;
    var acao = null;
    var midiaAtiva = (tipoAtual === "audio") ? mediaAudio : mediaVideo;

    switch(key) {
        case 13:   // OK / Enter -> Toggle Play/Pause imediato
            acao = "toggle_play";
            if(midiaAtiva && tipoAtual !== "image"){
                if(midiaAtiva.paused) midiaAtiva.play().catch(function(){});
                else midiaAtiva.pause();
            }
            break;
        case 37:   // Seta Esquerda -> Recuar 15s instantâneo
            acao = "seek_backward";
            if(midiaAtiva && tipoAtual !== "image") midiaAtiva.currentTime = Math.max(0, midiaAtiva.currentTime - 15);
            break;
        case 39:   // Seta Direita -> Avançar 15s instantâneo
            acao = "seek_forward";
            if(midiaAtiva && tipoAtual !== "image") midiaAtiva.currentTime = Math.min(midiaAtiva.duration || 0, midiaAtiva.currentTime + 15);
            break;
        case 38:   // Seta Cima -> Volume Up
            acao = "volume_up";
            break;
        case 40:   // Seta Baixo -> Volume Down
            acao = "volume_down";
            break;
        case 8:     // Backspace
        case 27:    // Esc
        case 10009: // Sraf/Tizen Back
        case 461:   // LG Back
            acao = "stop";
            limparMidia();
            esconderTodos();
            break;
        case 33:   // Page Up / CH+
            acao = "next_track";
            break;
        case 34:   // Page Down / CH-
            acao = "prev_track";
            break;
    }

    if (acao) {
        e.preventDefault();
        showDebug("📺 " + acao.toUpperCase());
        enviarComando(acao);
    }
}, true); // UseCapture ativado para interceptar antes de qualquer outro elemento
</script>
</body>
</html>
