<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>X-Stream Engine Ultra Supremo</title>

<!-- SUPORTE A STREAMING HLS (M3U8 / LIVES / IPTV) -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* OTIMIZAÇÃO DE RENDERIZAÇÃO PARA SMART TV */
html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}

#mediaVideo, #mediaImage {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000; 
    object-fit: contain;
    display: none; 
    /* Aceleração de Hardware forçada (GPU) */
    transform: translateZ(0); 
    will-change: transform;
    backface-visibility: hidden;
}

#mediaVideo { z-index: 10; }
#mediaImage { z-index: 15; }
#mediaAudio { display: none; }

/* INDICADOR DISCRETO LIVE / OFFLINE OTIMIZADO */
#statusBadge {
    position: fixed;
    top: 25px;
    left: 25px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 0, 0, 0.6);
    padding: 6px 14px;
    border-radius: 20px;
    transition: opacity 0.3s ease; /* Removido animacoes pesadas */
}

.dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
}

.statusText {
    color: #ffffff;
    font-size: 11px;
    font-weight: bold;
    text-transform: uppercase;
}

#statusBadge.offline .dot { background: #ff3333; }
#statusBadge.live .dot { background: #00ff66; }

/* Feedback de tecla pressionada na TV */
#keyDebug {
    position: fixed; top: 25px; right: 25px;
    background: rgba(255, 107, 0, 0.8);
    color: white; padding: 10px 20px;
    border-radius: 10px; font-weight: bold;
    z-index: 10000; display: none;
    font-size: 14px;
}

#errorBox {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; background: #000;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; z-index: 20000;
}

#errorTitle { font-size: 40px; color: #ff3333; margin-bottom: 20px; }
#errorMessage { font-size: 22px; max-width: 80%; color: #ccc; }
</style>
</head>

<body>

<!-- Feedback de Controle Remoto -->
<div id="keyDebug"></div>

<div id="statusBadge" class="offline">
    <span class="dot"></span>
    <span id="statusText" class="statusText">OFFLINE</span>
</div>

<video id="mediaVideo" autoplay playsinline webkit-playsinline preload="auto" crossorigin="anonymous"></video>
<audio id="mediaAudio" autoplay preload="auto"></audio>
<img id="mediaImage">

<div id="errorBox">
    <div id="errorTitle">Erro</div>
    <div id="errorMessage">Não foi possível reproduzir este formato.</div>
</div>

<script>
// Mantendo compatibilidade com JavaScript ES5 (Sraf Browser Antigo)
var SERVER_URL = (window.location.origin && window.location.origin.startsWith("http"))
    ? window.location.origin 
    : "https://x-stream-56ya.onrender.com";

// Deriva a URL do WebSocket automaticamente
var WS_URL = SERVER_URL.replace("http://", "ws://").replace("https://", "wss://");

var mediaVideo = document.getElementById("mediaVideo");
var mediaAudio = document.getElementById("mediaAudio");
var mediaImage = document.getElementById("mediaImage");
var statusBadge = document.getElementById("statusBadge");
var statusText = document.getElementById("statusText");
var keyDebug = document.getElementById("keyDebug");

var tipoAtual = "";
var urlAtual = "";
var ultimaURL = "";
var pollTimeout = null;
var hlsPlayer = null;
var debugTimeout = null;
var tempoInicialAjustado = false;
var ultimoComandoIdProcessado = 0;
var wsConnection = null;

function showDebug(msg) {
    keyDebug.innerText = msg;
    keyDebug.style.display = "block";
    clearTimeout(debugTimeout);
    debugTimeout = setTimeout(function(){ keyDebug.style.display = "none"; }, 1500);
}

function atualizarStatus(isLive){
    if(isLive){
        statusBadge.className = "live";
        statusText.innerHTML = "LIVE";
    } else {
        statusBadge.className = "offline";
        statusText.innerHTML = "OFFLINE";
    }
}

function mostrarErro(msg){
    var box = document.getElementById("errorBox");
    if(box){
        box.style.display = "flex";
        var texto = document.getElementById("errorMessage");
        if(texto) texto.innerHTML = msg;
    }
}

function limparMidia(){
    atualizarStatus(false);
    tempoInicialAjustado = false;

    if (hlsPlayer) {
        try { hlsPlayer.destroy(); hlsPlayer = null; } catch(e){}
    }
    try { mediaVideo.pause(); mediaVideo.removeAttribute("src"); mediaVideo.load(); } catch(e){}
    try { mediaAudio.pause(); mediaAudio.removeAttribute("src"); mediaAudio.load(); } catch(e){}
    try { mediaImage.removeAttribute("src"); } catch(e){}
}

function receberMidia(url, tempoInicial){
    if(!url || url === urlAtual) return;
    urlAtual = url;
    limparMidia();

    var urlLimpa = url.split('?')[0].toLowerCase();
    if (urlLimpa.endsWith('.m3u8')) {
        tentarHLS(url, tempoInicial);
    } else {
        tentarVideo(url, tempoInicial);
    }
}

function tentarHLS(url, tempoInicial) {
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
        hlsPlayer = new Hls({
            enableWorker: false, // Worker pode causar lentidao em TVs antigas
            maxBufferLength: 10,
            maxMaxBufferLength: 20,
            lowLatencyMode: false
        });
        hlsPlayer.loadSource(url);
        hlsPlayer.attachMedia(mediaVideo);
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
            tipoAtual = "video";
            mostrarVideo();
            iniciarVideo(tempoInicial);
        });
        hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) { tentarVideo(url, tempoInicial); }
        });
    } else if (mediaVideo.canPlayType('application/vnd.apple.mpegurl')) {
        mediaVideo.src = url;
        tentarVideo(url, tempoInicial);
    } else {
        tentarVideo(url, tempoInicial);
    }
}

function tentarVideo(url, tempoInicial){
    var confirmado = false;
    mediaVideo.src = url;
    mediaVideo.load();

    function ativarVideo(){
        if(confirmado) return;
        confirmado = true;
        tipoAtual = "video";
        mostrarVideo();
        iniciarVideo(tempoInicial);
    }
    mediaVideo.onloadeddata = ativarVideo;
    mediaVideo.oncanplay = ativarVideo;
    mediaVideo.onerror = function(){ if(!confirmado) tentarAudio(url); };
}

function tentarAudio(url){
    var confirmado = false;
    mediaAudio.src = url;
    mediaAudio.load();
    mediaAudio.oncanplay = function(){
        if(confirmado) return;
        confirmado = true; 
        tipoAtual = "audio";
        mediaAudio.play();
        atualizarStatus(true);
    };
    mediaAudio.onerror = function(){ if(!confirmado) tentarImagem(url); };
}

function tentarImagem(url){
    var img = new Image();
    img.onload = function(){
        tipoAtual = "image"; 
        mediaImage.src = url;
        mostrarImagem(); 
        atualizarStatus(true);
    };
    img.onerror = function(){ 
        atualizarStatus(false);
        mostrarErro("Formato ou link não suportado"); 
    };
    img.src = url;
}

function esconderTodos(){
    mediaVideo.style.display = "none";
    mediaAudio.style.display = "none";
    mediaImage.style.display = "none";
    var box = document.getElementById("errorBox");
    if(box) box.style.display = "none";
}

function mostrarVideo(){ esconderTodos(); mediaVideo.style.display = "block"; }
function mostrarImagem(){ esconderTodos(); mediaImage.style.display = "block"; }

function iniciarVideo(tempoInicial){
    if(tempoInicial && !tempoInicialAjustado){
        try { mediaVideo.currentTime = Number(tempoInicial); } catch(e){}
        tempoInicialAjustado = true;
    }
    var tentativa = mediaVideo.play();
    if(tentativa !== undefined){
        tentativa.then(function(){ 
            atualizarStatus(true);
        }).catch(function(){ 
            setTimeout(function(){ iniciarVideo(tempoInicial); }, 500); 
        });
    }
}

mediaVideo.onplaying = function() { atualizarStatus(true); };
mediaVideo.onpause = function() { atualizarStatus(false); };

// Quando o vídeo termina, dispara o avanço automático da fila (NOVO COMANDO)
mediaVideo.onended = function(){ enviarComando("next_track"); };

// ==========================================
// NÚCLEO DE COMUNICAÇÃO: WEBSOCKET + POLLING
// ==========================================

function processarEstadoServidor(dados) {
    var url = "";
    if(dados.fila && dados.fila.length > 0 && dados.fila[dados.atual]){
        url = dados.fila[dados.atual].url;
    }
    if(!url && dados.video){ url = dados.video; }

    // Troca de mídia
    if((dados.ativo || dados.playing !== false) && url){
        if(url !== ultimaURL){
            ultimaURL = url;
            receberMidia(url, dados.currentTime || 0);
        }
    } else if (!dados.ativo && !dados.playing && !dados.video) {
        if(urlAtual !== ""){
            urlAtual = ""; 
            ultimaURL = "";
            limparMidia(); 
            esconderTodos(); 
            atualizarStatus(false);
        }
    }

    // Controle de Play/Pause, Mute/Volume
    if(tipoAtual === "video" && mediaVideo){
        var isPlaying = (dados.playing !== undefined) ? dados.playing : dados.reproduzindo;

        if(isPlaying === false && !mediaVideo.paused){
            mediaVideo.pause();
        } else if(isPlaying === true && mediaVideo.paused){
            mediaVideo.play().catch(function(){});
        }

        if(dados.volume !== undefined){ mediaVideo.volume = dados.volume / 100; }
        if(dados.mudo !== undefined){ mediaVideo.muted = dados.mudo; }

        // Execução de salto de seek adaptado para os novos comandos
        if(dados.seek && dados.seek !== 0 && dados.comandoId !== ultimoComandoIdProcessado){
            ultimoComandoIdProcessado = dados.comandoId;
            var novoTempo = mediaVideo.currentTime + dados.seek;
            mediaVideo.currentTime = Math.max(0, Math.min(novoTempo, mediaVideo.duration || 0));
            enviarComando("seek_reset"); // Antigo zerar_seek
        }
    }

    // Feedback remoto no Celular
    if(dados.ultimoComando && dados.comandoId !== ultimoComandoIdProcessado){
        ultimoComandoIdProcessado = dados.comandoId;
        showDebug("📱 CELULAR: " + dados.ultimoComando.toUpperCase());
    }
}

// 1. WebSocket (Modo Principal - Zero Engasgamento)
function iniciarWebSocket() {
    try {
        wsConnection = new WebSocket(WS_URL);
        wsConnection.onopen = function() {
            console.log("WebSocket Conectado!");
        };
        wsConnection.onmessage = function(event) {
            try {
                var dados = JSON.parse(event.data);
                processarEstadoServidor(dados);
            } catch(e){}
        };
        wsConnection.onclose = function() {
            setTimeout(iniciarWebSocket, 5000); // Tenta reconectar
        };
    } catch(e) {
        console.log("WebSocket falhou, caindo para Polling.");
    }
}

// 2. Polling (Fallback apenas se o WebSocket falhar ou demorar)
function verificarServidorHTTP(){
    if (wsConnection && wsConnection.readyState === 1) {
        // Se o WebSocket estiver aberto, não roda o Polling (poupando CPU da TV)
        pollTimeout = setTimeout(verificarServidorHTTP, 3000);
        return;
    }

    var xhr = new XMLHttpRequest();
    xhr.open("GET", SERVER_URL + "/status?t=" + Date.now(), true);
    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4){
            if(xhr.status === 200){
                try{
                    var dados = JSON.parse(xhr.responseText);
                    processarEstadoServidor(dados);
                }catch(e){}
            } else {
                atualizarStatus(false);
            }
            clearTimeout(pollTimeout);
            pollTimeout = setTimeout(verificarServidorHTTP, 3000);
        }
    };
    xhr.onerror = function() { 
        atualizarStatus(false);
        clearTimeout(pollTimeout);
        pollTimeout = setTimeout(verificarServidorHTTP, 3000); 
    };
    xhr.send();
}

// Inicializa as conexões
iniciarWebSocket();
verificarServidorHTTP();

function enviarComando(acao){
    var xhr = new XMLHttpRequest();
    xhr.open("POST", SERVER_URL + "/controle", true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify({ acao: acao }));
}

// ==========================================
// CAPTURA DO CONTROLE REMOTO DA TV SRAF
// ==========================================
document.addEventListener("keydown", function(e) {
    var key = e.keyCode || e.which;
    var acaoDetectada = null;

    switch(key) {
        case 13:   // Botão OK / Enter
            acaoDetectada = "toggle_play"; 
            break;
        case 37:   // Seta Esquerda
            acaoDetectada = "seek_backward"; 
            break;
        case 39:   // Seta Direita
            acaoDetectada = "seek_forward"; 
            break;
        case 38:   // Seta Cima
            acaoDetectada = "volume_up"; 
            break;
        case 40:   // Seta Baixo
            acaoDetectada = "volume_down"; 
            break;
        case 8:     // Backspace
        case 27:    // Esc
        case 10009: // Botão RETURN/BACK Típico do Sraf / Tizen
        case 461:   // Botão BACK Típico LG
            acaoDetectada = "stop"; 
            break;
        case 427:  // Botão CH UP (Canal Cima)
        case 33:   // Page Up
            acaoDetectada = "next_track";
            break;
        case 428:  // Botão CH DOWN (Canal Baixo)
        case 34:   // Page Down
            acaoDetectada = "prev_track";
            break;
    }

    if (acaoDetectada) {
        e.preventDefault(); // Impede que a TV role a tela
        showDebug("📺 TV: " + acaoDetectada.toUpperCase());
        enviarComando(acaoDetectada);
    }
});

</script>
</body>
</html>
