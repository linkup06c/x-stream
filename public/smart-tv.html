<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>X-Stream Remote Control</title>
    <!-- Ícones do FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .remote-container {
            width: 100%;
            max-width: 360px;
            background-color: #1e1e1e;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2d2d2d;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 18px;
            color: #ff6b00;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-bar {
            background-color: #2a2a2a;
            border-radius: 12px;
            padding: 10px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 20px;
            color: #aaa;
            border: 1px solid #333;
        }

        .grid-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 10px;
        }

        .btn {
            background-color: #2b2b2b;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: scale(0.92);
            background-color: #ff6b00;
        }

        .btn-pill {
            border-radius: 25px;
            width: 100%;
            height: 45px;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-power {
            background-color: #b71c1c;
        }
        .btn-power:active {
            background-color: #d32f2f;
        }

        .btn-orange {
            background-color: #ff6b00;
        }

        /* Envio de URL / Link */
        .url-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .url-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .url-input:focus {
            border-color: #ff6b00;
        }

        /* D-PAD (Direcional) */
        .dpad-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 20px auto;
            background-color: #252525;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.3);
        }

        .dpad-btn {
            position: absolute;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.1s;
        }

        .dpad-btn:active {
            color: #ff6b00;
        }

        .dpad-up { top: 5px; left: 65px; }
        .dpad-down { bottom: 5px; left: 65px; }
        .dpad-left { left: 5px; top: 65px; }
        .dpad-right { right: 5px; top: 65px; }
        
        .dpad-ok {
            width: 70px;
            height: 70px;
            background-color: #333;
            border-radius: 50%;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .dpad-ok:active {
            background-color: #ff6b00;
        }

        .section-title {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="remote-container">
        <div class="header">
            <h1>X-Stream Control</h1>
        </div>

        <div class="status-bar" id="statusText">
            Conectado ao Servidor
        </div>

        <!-- Transmitir Nova Mídia / URL -->
        <div class="section-title">Transmitir Mídia</div>
        <div class="url-box">
            <input type="url" id="mediaUrl" class="url-input" placeholder="Cole o link do vídeo/áudio aqui..." autocomplete="off" />
            <button class="btn btn-pill btn-orange" onclick="enviarMidia()"><i class="fa-solid fa-paper-plane"></i> Transmitir</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #2a2a2a; margin: 15px 0;">

        <!-- Linha Superior: Power / Mute / Clear -->
        <div class="grid-row">
            <button class="btn btn-power" onclick="enviarComando('power')"><i class="fa-solid fa-power-off"></i></button>
            <button class="btn" onclick="enviarComando('mute')"><i class="fa-solid fa-volume-xmark"></i></button>
            <button class="btn" onclick="enviarComando('clear')"><i class="fa-solid fa-trash"></i></button>
        </div>

        <hr style="border: 0; border-top: 1px solid #2a2a2a; margin: 15px 0;">

        <!-- Controles de Mídia -->
        <div class="section-title">Reprodução</div>
        <div class="grid-row">
            <button class="btn" onclick="enviarComando('prev')"><i class="fa-solid fa-backward-step"></i></button>
            <button class="btn btn-orange" onclick="enviarComando('play')"><i class="fa-solid fa-play"></i>/<i class="fa-solid fa-pause"></i></button>
            <button class="btn" onclick="enviarComando('next')"><i class="fa-solid fa-forward-step"></i></button>
        </div>

        <!-- Volume -->
        <div class="grid-row" style="margin-top: 10px;">
            <button class="btn btn-pill" onclick="enviarComando('vol_down')"><i class="fa-solid fa-volume-low"></i> Vol -</button>
            <button class="btn btn-pill" onclick="enviarComando('vol_up')"><i class="fa-solid fa-volume-high"></i> Vol +</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #2a2a2a; margin: 15px 0;">

        <!-- D-PAD / Direcional -->
        <div class="section-title" style="text-align: center;">Navegação TV</div>
        <div class="dpad-container">
            <button class="dpad-btn dpad-up" onclick="enviarComando('up')"><i class="fa-solid fa-chevron-up"></i></button>
            <button class="dpad-btn dpad-left" onclick="enviarComando('left')"><i class="fa-solid fa-chevron-left"></i></button>
            <button class="dpad-ok" onclick="enviarComando('ok')">OK</button>
            <button class="dpad-btn dpad-right" onclick="enviarComando('right')"><i class="fa-solid fa-chevron-right"></i></button>
            <button class="dpad-btn dpad-down" onclick="enviarComando('down')"><i class="fa-solid fa-chevron-down"></i></button>
        </div>

        <!-- Rodapé do Controle (Home / Back) -->
        <div class="grid-row" style="margin-top: 10px;">
            <button class="btn btn-pill" onclick="enviarComando('back')" style="background-color: #333;"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <button class="btn btn-pill" onclick="enviarComando('home')" style="background-color: #333;"><i class="fa-solid fa-house"></i> Home</button>
        </div>

    </div>

    <script>
        var SERVER_URL = (window.location.origin && window.location.origin.startsWith("http"))
            ? window.location.origin 
            : "https://x-stream-56ya.onrender.com";

        // Interligação de todos os botões com a rota /controle do servidor
        function enviarComando(acao) {
            var statusText = document.getElementById("statusText");
            statusText.innerText = "Enviando: " + acao + "...";

            var xhr = new XMLHttpRequest();
            xhr.open("POST", SERVER_URL + "/controle", true);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        statusText.innerText = "Comando [" + acao + "] enviado!";
                    } else {
                        statusText.innerText = "Erro ao enviar comando.";
                    }
                    setTimeout(function() {
                        statusText.innerText = "Conectado ao Servidor";
                    }, 1500);
                }
            };

            xhr.onerror = function() {
                statusText.innerText = "Erro de conexão.";
            };

            xhr.send(JSON.stringify({ acao: acao }));
        }

        // Interligação da caixa de envio de mídia com a rota /enviar do servidor
        function enviarMidia() {
            var input = document.getElementById("mediaUrl");
            var url = input.value.trim();
            var statusText = document.getElementById("statusText");

            if (!url) {
                statusText.innerText = "Cole uma URL primeiro!";
                setTimeout(function() { statusText.innerText = "Conectado ao Servidor"; }, 1500);
                return;
            }

            statusText.innerText = "Transmitindo mídia...";

            var xhr = new XMLHttpRequest();
            xhr.open("POST", SERVER_URL + "/enviar", true);
            xhr.setRequestHeader("Content-Type", "application/json");

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        statusText.innerText = "Mídia enviada com sucesso!";
                        input.value = "";
                    } else {
                        statusText.innerText = "Erro ao transmitir mídia.";
                    }
                    setTimeout(function() {
                        statusText.innerText = "Conectado ao Servidor";
                    }, 1500);
                }
            };

            xhr.onerror = function() {
                statusText.innerText = "Erro de conexão.";
            };

            xhr.send(JSON.stringify({ url: url }));
        }
    </script>
</body>
</html>
