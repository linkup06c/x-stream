<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>X-Stream Universal Player</title>


<style>

/* =====================================
   X-STREAM TV PLAYER
   VISUAL COMPATÍVEL TV / WEBVIEW
===================================== */

html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:white;

}


/* =====================================
   VÍDEO
===================================== */

#mediaVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

display:none;

z-index:10;

}


/* =====================================
   ÁUDIO
===================================== */

#mediaAudio{

display:none;

}


/* =====================================
   IMAGEM
===================================== */

#mediaImage{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

display:none;

z-index:15;

}


/* =====================================
   TELA AGUARDANDO
===================================== */

#waiting{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

font-size:28px;

z-index:5000;

}


.loader{

width:55px;

height:55px;

border-radius:50%;

border:6px solid #555;

border-top-color:white;

animation:
spin 1s linear infinite;

margin-bottom:25px;

}


@keyframes spin{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}


/* =====================================
   ERRO
===================================== */

#errorBox{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#000;

display:none;

align-items:center;

justify-content:center;

flex-direction:column;

text-align:center;

z-index:20000;

}


#errorTitle{

font-size:40px;

margin-bottom:20px;

}


#errorMessage{

font-size:22px;

max-width:80%;

}


/* =====================================
   INFORMAÇÃO ÁUDIO
===================================== */

#audioInfo{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#000;

display:none;

align-items:center;

justify-content:center;

flex-direction:column;

z-index:20;

}


#audioInfo:before{

content:"♫";

font-size:120px;

margin-bottom:30px;

}


#audioTitle{

font-size:32px;

font-weight:bold;

}


/* =====================================
   COMPATIBILIDADE TV
===================================== */

button,
video,
audio,
img{

outline:none;

}


*{

-webkit-tap-highlight-color:transparent;

}


/* =====================================
   CURSOR ORIGINAL DO PROJETO
===================================== */

#cursorLayer{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;


z-index:99999;


color:transparent;

background:transparent;


user-select:text;

-webkit-user-select:text;


cursor:text;


}

</style>

</head>

<body>


<div id="cursorLayer">

Texto de teste invisível

</div>


<!-- =====================================
     VÍDEO PRINCIPAL
===================================== -->

<video

id="mediaVideo"

autoplay

playsinline

webkit-playsinline

preload="auto"

></video>


<!-- =====================================
     ÁUDIO
===================================== -->

<audio

id="mediaAudio"

autoplay

preload="auto"

></audio>


<!-- =====================================
     IMAGEM
===================================== -->

<img

id="mediaImage"

>


<!-- =====================================
     INFORMAÇÃO ÁUDIO
===================================== -->

<div id="audioInfo">

<div id="audioTitle">

Áudio

</div>

</div>


<!-- =====================================
     AGUARDANDO
===================================== -->

<div id="waiting">

<div class="loader"></div>

<div>

Aguardando transmissão...

</div>

</div>


<!-- =====================================
     ERRO
===================================== -->

<div id="errorBox">

<div id="errorTitle">

Erro

</div>

<div id="errorMessage">

Não foi possível reproduzir.

</div>

</div>
