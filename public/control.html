<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>X-Stream Controle</title>


<style>

body{

margin:0;

padding:20px;

background:#111;

color:white;

font-family:Arial,sans-serif;

}


h1{

text-align:center;

}


.box{

background:#222;

padding:20px;

border-radius:12px;

margin-bottom:20px;

}



input{

width:100%;

padding:14px;

font-size:18px;

box-sizing:border-box;

border-radius:8px;

border:0;

}



button{

padding:12px 18px;

margin:5px;

border:0;

border-radius:8px;

font-size:16px;

cursor:pointer;

}



button:active{

transform:scale(.95);

}



.lista{

background:#000;

padding:15px;

border-radius:10px;

}



.item{

background:#222;

padding:15px;

margin-bottom:10px;

border-radius:8px;

display:flex;

justify-content:space-between;

align-items:center;

}



.item span{

cursor:pointer;

font-size:18px;

}



.delete{

background:#900;

color:white;

}


</style>


</head>


<body>


<h1>
X-Stream Controle
</h1>




<div class="box">


<h2>
Adicionar vídeo
</h2>


<input

id="url"

placeholder="Cole o link do vídeo"

>


<br><br>


<button onclick="enviar()">

Adicionar

</button>


</div>






<div class="box">


<h2>
Controles
</h2>



<button onclick="comando('previous')">

◀ Anterior

</button>



<button onclick="comando('next')">

Próximo ▶

</button>



<button onclick="limpar()">

🗑 Limpar fila

</button>



</div>







<div class="box">


<h2>
Fila atual
</h2>



<div id="fila" class="lista">

Carregando...

</div>


</div>







<script>


// =====================================
// SERVIDOR
// =====================================


const servidor =

"https://x-stream-56ya.onrender.com";








// =====================================
// ADICIONAR
// =====================================


function enviar(){



let url =

document.getElementById("url").value.trim();



if(!url){

alert(
"Digite uma URL"
);

return;

}




fetch(

servidor+"/enviar",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

url:url

})

}

)

.then(r=>r.json())

.then(()=>{


document.getElementById("url").value="";


atualizar();


});



}









// =====================================
// COMANDO
// =====================================


function comando(acao){



fetch(

servidor+"/controle",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

acao:acao

})

}

)

.then(()=>{


atualizar();


});



}









// =====================================
// SELECIONAR LINK
// =====================================


function selecionar(index){



fetch(

servidor+"/selecionar",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

index:index

})

}

)

.then(()=>{


atualizar();


});



}








// =====================================
// REMOVER
// =====================================


function remover(index){



fetch(

servidor+"/remover",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

index:index

})

}

)

.then(()=>{


atualizar();


});


}









// =====================================
// LIMPAR
// =====================================


function limpar(){



fetch(

servidor+"/limpar",

{

method:"POST"

}

)

.then(()=>{


atualizar();


});



}









// =====================================
// ATUALIZAR
// =====================================


function atualizar(){



fetch(

servidor+"/status"

)

.then(r=>r.json())

.then(dados=>{


mostrarFila(dados);


});


}









// =====================================
// MOSTRAR FILA
// =====================================


function mostrarFila(dados){



let html="";




if(

!dados.fila ||

dados.fila.length===0

){


html="Fila vazia";


}else{



dados.fila.forEach(

(item,index)=>{



let ativo="";



if(index===dados.atual){


ativo="▶ ";


}else{


ativo="○ ";


}




html += `


<div class="item">


<span onclick="selecionar(${index})">

${ativo}Link ${index+1}

</span>



<button class="delete"

onclick="remover(${index})">

🗑

</button>


</div>


`;



}


);



}



document.getElementById(

"fila"

).innerHTML=html;



}








// inicialização


atualizar();



setInterval(

atualizar,

3000

);



</script>


</body>

</html>
