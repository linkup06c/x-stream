<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X-Stream Controle V4</title>


<style>


body{

margin:0;

padding:20px;

background:#111;

color:white;

font-family:Arial,sans-serif;

}



h1{

text-align:center;

}



.box{

background:#222;

padding:20px;

border-radius:12px;

margin-bottom:20px;

}



input{

width:100%;

padding:14px;

font-size:18px;

box-sizing:border-box;

border-radius:8px;

border:0;

}



button{

padding:12px 18px;

margin:5px;

border:0;

border-radius:8px;

font-size:16px;

cursor:pointer;

}



button:active{

transform:scale(.95);

}



#lista{

background:#000;

padding:15px;

border-radius:10px;

}



.item{

display:flex;

justify-content:space-between;

align-items:center;

background:#222;

padding:12px;

margin-bottom:10px;

border-radius:8px;

}



.nome{

font-size:18px;

}



.excluir{

background:#b00020;

color:white;

}



.controle{

background:#0066cc;

color:white;

}



.limpar{

background:#aa0000;

color:white;

}



</style>

</head>


<body>



<h1>

X-Stream Controle V4

</h1>




<div class="box">


<h2>

Adicionar vídeo

</h2>


<input

id="url"

placeholder="Cole a URL do vídeo"

>


<br><br>


<button onclick="adicionar()">

Adicionar

</button>


</div>






<div class="box">


<h2>

Controle

</h2>



<button 
class="controle"
onclick="anterior()">

◀ Anterior

</button>



<button
class="controle"
onclick="proximo()">

Próximo ▶

</button>



<button
class="limpar"
onclick="limpar()">

Limpar lista

</button>



</div>






<div class="box">


<h2>

Fila atual

</h2>


<div id="lista">

Carregando...

</div>


</div>






<script>


const servidor="";





// =====================================
// ADICIONAR
// =====================================


function adicionar(){



let url =
document.getElementById("url").value.trim();



if(!url){

return;

}



fetch(

servidor+"/enviar",

{


method:"POST",

headers:{

"Content-Type":
"application/json"

},


body:JSON.stringify({

url:url

})


}


)

.then(()=>{


document.getElementById("url").value="";


atualizar();


});


}







// =====================================
// PRÓXIMO
// =====================================


function proximo(){


fetch(

servidor+"/next",

{

method:"POST"

}

);


}






// =====================================
// ANTERIOR
// =====================================


function anterior(){


fetch(

servidor+"/previous",

{

method:"POST"

}

);


}






// =====================================
// EXCLUIR
// =====================================


function remover(index){



fetch(

servidor+"/remover",

{


method:"POST",

headers:{

"Content-Type":
"application/json"

},


body:JSON.stringify({

index:index

})


}


)

.then(()=>{


atualizar();


});


}







// =====================================
// LIMPAR
// =====================================


function limpar(){



fetch(

servidor+"/limpar",

{

method:"POST"

}

)

.then(()=>{


atualizar();


});


}







// =====================================
// ATUALIZAR LISTA
// =====================================


function atualizar(){



fetch(

servidor+"/status"

)


.then(r=>r.json())


.then(dados=>{


let html="";



if(
!dados.fila ||
dados.fila.length===0
){


html="Fila vazia";


}else{



dados.fila.forEach(
(item,index)=>{


let atual="";


if(
index===dados.atual
){

atual="▶ ";

}



html +=

`
<div class="item">

<div class="nome">

${atual}

${item.nome}

</div>


<button 
class="excluir"
onclick="remover(${index})">

Excluir

</button>


</div>
`;



});


}



document.getElementById(
"lista"
).innerHTML=html;



});


}







// =====================================
// INICIAR
// =====================================


atualizar();



setInterval(

atualizar,

3000

);



</script>


</body>

</html>
