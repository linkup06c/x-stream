<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X-Stream Controle V3</title>


<style>


body{

margin:0;

padding:20px;

background:#111;

color:white;

font-family:Arial,sans-serif;

}



h1{

text-align:center;

}



.box{


background:#222;


padding:20px;


border-radius:12px;


margin-bottom:20px;


}



input{


width:100%;


padding:12px;


font-size:18px;


box-sizing:border-box;


}




button{


padding:12px 18px;


margin:5px;


border:0;


border-radius:8px;


font-size:16px;


cursor:pointer;


}



button:active{


transform:scale(.95);


}




#estado,
#fila{


background:#000;


padding:15px;


border-radius:8px;


line-height:25px;


overflow-wrap:anywhere;


}



</style>

</head>


<body>



<h1>

X-Stream Controle V3

</h1>





<div class="box">


<h2>

Adicionar mídia

</h2>



<input

id="url"

placeholder="Cole o link do vídeo"

>



<br><br>



<button onclick="enviar()">

Adicionar

</button>



</div>







<div class="box">


<h2>

Controles

</h2>



<button onclick="comando('play')">

▶ Play

</button>



<button onclick="comando('pause')">

⏸ Pause

</button>



<button onclick="seek(-10)">

⏪ -10s

</button>



<button onclick="seek(10)">

⏩ +10s

</button>



<button onclick="comando('previous')">

◀ Anterior

</button>



<button onclick="comando('next')">

▶ Próximo

</button>



<button onclick="limpar()">

🗑 Limpar

</button>



</div>







<div class="box">


<h2>

Estado

</h2>



<div id="estado">

Carregando...

</div>



</div>







<div class="box">


<h2>

Fila

</h2>



<div id="fila">

Vazia

</div>



</div>







<script>


// =====================================
// SERVIDOR
// =====================================


const servidor =

"https://x-stream-56ya.onrender.com";






// =====================================
// ENVIAR URL
// =====================================


function enviar(){



let url =

document.getElementById("url").value.trim();




if(!url){

alert(
"Digite uma URL"
);

return;

}





fetch(

servidor+"/enviar",

{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify({

url:url

})


}


)

.then(r=>r.json())

.then(()=>{


document.getElementById("url").value="";


atualizar();



});



}







// =====================================
// COMANDO
// =====================================


function comando(acao){



fetch(

servidor+"/controle",

{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify({

acao:acao

})


}


)

.then(()=>{


atualizar();


});



}








// =====================================
// SEEK
// =====================================


function seek(valor){



fetch(

servidor+"/status"

)

.then(r=>r.json())


.then(dados=>{



let nova =

Number(dados.posicao || 0)

+

valor;




if(nova<0){

nova=0;

}





fetch(

servidor+"/controle",

{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify({

acao:"seek",

valor:nova

})


}


);



});



}








// =====================================
// LIMPAR
// =====================================


function limpar(){



fetch(

servidor+"/limpar",

{

method:"POST"

}


)

.then(()=>{


atualizar();


});


}







// =====================================
// ATUALIZAR
// =====================================


function atualizar(){



fetch(

servidor+"/status"

)


.then(r=>r.json())


.then(dados=>{



mostrarEstado(dados);



});


}







// =====================================
// MOSTRAR ESTADO
// =====================================


function mostrarEstado(dados){



document.getElementById(
"estado"
).innerHTML = `


<b>Estado:</b>
${dados.estado}

<br>


<b>Posição:</b>
${Math.floor(dados.posicao)}s


<br>


<b>Atual:</b>
${dados.atual+1}



`;





let fila="";




dados.fila.forEach(
(item,index)=>{


if(index===dados.atual){

fila+="▶ ";

}else{

fila+="○ ";

}



fila+=

(index+1)

+" - "

+item.url

+"<br><br>";



}

);




document.getElementById(
"fila"
).innerHTML =

fila || "Fila vazia";



}







// inicialização


atualizar();



setInterval(

atualizar,

2000

);



</script>


</body>

</html>
