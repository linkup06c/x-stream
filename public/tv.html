<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>X-Stream Universal Player</title>

<style>
/* =====================================
   X-STREAM UNIVERSAL PLAYER
   CSS FINAL
===================================== */


html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:#fff;

}



/* =====================================
   VÍDEO
===================================== */


#mediaVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

display:none;

z-index:10;

}



/* =====================================
   ÁUDIO
===================================== */


#mediaAudio{

display:none;

}



#audioInfo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

display:none;

align-items:center;

justify-content:center;

flex-direction:column;

z-index:20;

}



#audioInfo:before{

content:"♫";

font-size:120px;

margin-bottom:30px;

}



#audioTitle{

font-size:32px;

font-weight:bold;

text-align:center;

}





/* =====================================
   IMAGEM
===================================== */


#mediaImage{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;


object-fit:contain;


background:#000;


display:none;


z-index:15;

}





/* =====================================
   STATUS
===================================== */


#status{

position:fixed;


top:20px;

left:20px;


background:rgba(0,0,0,.75);


padding:15px 20px;


border-radius:10px;


z-index:9999;


transition:.5s;


}



#statusTitle{


font-size:24px;


font-weight:bold;


margin-bottom:8px;


}



#statusMessage{


font-size:18px;


}




/* =====================================
   TELA AGUARDANDO
===================================== */


#waiting{


position:fixed;


top:0;
left:0;


width:100%;
height:100%;


background:#000;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;


z-index:5000;


font-size:28px;


}



.loader{


width:55px;

height:55px;


border-radius:50%;


border:6px solid #555;


border-top-color:#fff;


animation:spin 1s linear infinite;


margin-bottom:25px;


}



@keyframes spin{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}




/* =====================================
   ERRO
===================================== */


#errorBox{


position:fixed;


top:0;
left:0;


width:100%;
height:100%;


background:#000;


display:none;


align-items:center;


justify-content:center;


flex-direction:column;


text-align:center;


z-index:20000;


}



#errorTitle{


font-size:40px;


margin-bottom:20px;


}



#errorMessage{


font-size:22px;


max-width:80%;


}




/* =====================================
   CONTROLES REMOTOS
===================================== */


button,
video,
audio,
img{

outline:none;

}



/* =====================================
   TV ANTIGA
   EVITAR ANIMAÇÕES PESADAS
===================================== */


*{

-webkit-tap-highlight-color:transparent;

}

</style>

</head>


<body>

<!-- VÍDEO -->

<video
id="mediaVideo"
autoplay
playsinline
webkit-playsinline
preload="auto">
</video>


<!-- ÁUDIO -->

<audio
id="mediaAudio"
autoplay
preload="auto">
</audio>


<!-- IMAGEM -->

<img
id="mediaImage">

<script>
// =====================================
// X-STREAM INTELLIGENT MEDIA DETECTOR
// IDENTIFICA VIDEO / AUDIO / IMAGEM
// SEM DEPENDER DA EXTENSÃO
// =====================================


var mediaVideo = document.getElementById("mediaVideo");

var mediaAudio = document.getElementById("mediaAudio");

var mediaImage = document.getElementById("mediaImage");


var tipoAtual = "";

var urlAtual = "";



// =====================================
// LIMPAR PLAYERS
// =====================================

function limparMidia(){


    try{

        mediaVideo.pause();

        mediaVideo.removeAttribute("src");

        mediaVideo.load();


    }catch(e){}



    try{

        mediaAudio.pause();

        mediaAudio.removeAttribute("src");

        mediaAudio.load();


    }catch(e){}



    mediaImage.removeAttribute("src");


}



// =====================================
// RECEBE UMA URL
// =====================================

function receberMidia(url){


    if(!url){

        return;

    }


    if(url == urlAtual){

        return;

    }


    urlAtual = url;



    limparMidia();



    mostrarStatus(
        "X-Stream",
        "Analisando mídia..."
    );



    /*
       Primeiro tenta vídeo,
       porque a maioria dos links
       do seu sistema são streams.
    */


    tentarVideo(url);



}



// =====================================
// TENTAR VÍDEO
// =====================================

function tentarVideo(url){


    var confirmado = false;


    mediaVideo.src = url;

    mediaVideo.load();



    mediaVideo.oncanplay = function(){


        if(confirmado){

            return;

        }


        confirmado=true;


        tipoAtual="video";


        mostrarVideo();



        iniciarVideo();



    };



    mediaVideo.onerror = function(){


        if(confirmado){

            return;

        }


        tentarAudio(url);


    };


}



// =====================================
// TENTAR ÁUDIO
// =====================================

function tentarAudio(url){


    var confirmado=false;


    mediaAudio.src=url;


    mediaAudio.load();



    mediaAudio.oncanplay=function(){


        if(confirmado){

            return;

        }


        confirmado=true;


        tipoAtual="audio";


        mostrarAudio();



        mediaAudio.play();



    };



    mediaAudio.onerror=function(){


        if(confirmado){

            return;

        }


        tentarImagem(url);



    };


}




// =====================================
// TENTAR IMAGEM
// =====================================

function tentarImagem(url){


    var img=new Image();



    img.onload=function(){


        tipoAtual="image";


        mediaImage.src=url;


        mostrarImagem();


    };



    img.onerror=function(){


        mostrarErro(
            "Formato não suportado"
        );


    };



    img.src=url;



}


// =====================================
// CONTROLE DE EXIBIÇÃO
// =====================================


function esconderTodos(){


    mediaVideo.style.display="none";

    mediaAudio.style.display="none";

    mediaImage.style.display="none";


}



// =====================================
// MOSTRAR VÍDEO
// =====================================


function mostrarVideo(){


    esconderTodos();


    mediaVideo.style.display="block";


}



// =====================================
// MOSTRAR ÁUDIO
// =====================================


function mostrarAudio(){


    esconderTodos();


    mediaAudio.style.display="block";


}



// =====================================
// MOSTRAR IMAGEM
// =====================================


function mostrarImagem(){


    esconderTodos();


    mediaImage.style.display="block";


}



// =====================================
// INICIAR VÍDEO
// =====================================


function iniciarVideo(){


    var tentativa = mediaVideo.play();



    if(tentativa !== undefined){


        tentativa.then(function(){


            esconderStatus();


        }).catch(function(){


            setTimeout(function(){


                iniciarVideo();


            },1000);


        });


    }


}




// =====================================
// STATUS
// =====================================


function mostrarStatus(titulo,texto){


    var box =
    document.getElementById("status");


    if(!box){

        return;

    }



    box.style.display="block";


    document.getElementById(
        "statusTitle"
    ).innerHTML=titulo;



    document.getElementById(
        "statusMessage"
    ).innerHTML=texto;



}



function esconderStatus(){


    var box =
    document.getElementById("status");


    if(box){


        box.style.display="none";


    }


}




// =====================================
// ERRO
// =====================================


function mostrarErro(msg){


    var erro =
    document.getElementById("errorBox");


    if(erro){


        erro.style.display="flex";


        document.getElementById(
            "errorMessage"
        ).innerHTML=msg;


    }


}



// =====================================
// EVENTOS DO PLAYER
// =====================================



mediaVideo.onplaying=function(){


    esconderStatus();


};



mediaAudio.onplaying=function(){


    esconderStatus();


};




mediaVideo.onwaiting=function(){


    mostrarStatus(
        "X-Stream",
        "Carregando..."
    );


};





// =====================================
// BUSCAR SERVIDOR
// =====================================


var ultimaURL="";



function verificarServidor(){



    var xhr =
    new XMLHttpRequest();



    xhr.open(
        "GET",
        "/status",
        true
    );



    xhr.onreadystatechange=function(){


        if(xhr.readyState==4 &&
           xhr.status==200){


            try{


                var dados =
                JSON.parse(
                    xhr.responseText
                );



                if(
                    dados.ativo &&
                    dados.video
                ){



                    if(
                    dados.video != ultimaURL
                    ){


                        ultimaURL =
                        dados.video;



                        receberMidia(
                            dados.video
                        );


                    }


                }



            }catch(e){



            }


        }


    };



    xhr.send();



}



// =====================================
// INICIAR
// =====================================


mostrarStatus(
    "X-Stream",
    "Conectando..."
);



verificarServidor();



setInterval(
    verificarServidor,
    3000
);




// =====================================
// RECUPERAÇÃO AUTOMÁTICA
// =====================================


function recuperarPlayer(){


    if(urlAtual){


        mostrarStatus(
            "X-Stream",
            "Reconectando..."
        );


        receberMidia(
            urlAtual
        );


    }


}




mediaVideo.onerror=function(){


    mostrarStatus(
        "X-Stream",
        "Tentando recuperar vídeo..."
    );


    setTimeout(
        recuperarPlayer,
        3000
    );


};




mediaAudio.onerror=function(){


    mostrarStatus(
        "X-Stream",
        "Tentando recuperar áudio..."
    );


    setTimeout(
        recuperarPlayer,
        3000
    );


};




// =====================================
// HLS (.m3u8)
// =====================================


function suportaHLS(){


    var video =
    document.createElement("video");


    return !!(
        video.canPlayType &&
        video.canPlayType(
        "application/vnd.apple.mpegurl"
        )
    );


}





// =====================================
// CONTROLE REMOTO TV
// =====================================


document.onkeydown=function(e){


    var tecla=e.keyCode;



    // ENTER

    if(tecla==13){


        if(tipoAtual=="video"){


            iniciarVideo();


        }


    }



    // PAUSAR / CONTINUAR

    if(tecla==32){


        if(tipoAtual=="video"){


            if(mediaVideo.paused){

                mediaVideo.play();

            }else{

                mediaVideo.pause();

            }


        }


        if(tipoAtual=="audio"){


            if(mediaAudio.paused){

                mediaAudio.play();

            }else{

                mediaAudio.pause();

            }


        }


    }



};




// =====================================
// INTERNET RECONECTADA
// =====================================


window.ononline=function(){


    mostrarStatus(
        "X-Stream",
        "Internet restaurada"
    );


    recuperarPlayer();


};





window.onoffline=function(){


    mostrarStatus(
        "X-Stream",
        "Sem conexão"
    );


};




// =====================================
// LIMPEZA DE MEMÓRIA
// TV BOX / SMART TV
// =====================================


setInterval(function(){


    try{


        if(
        mediaVideo.readyState==0 &&
        tipoAtual=="video"
        ){


            mediaVideo.load();


        }


    }catch(e){}



},20000);





// =====================================
// INÍCIO FINAL
// =====================================


mostrarStatus(
    "X-Stream",
    "Player pronto"
);
</script>


</body>

</html>
