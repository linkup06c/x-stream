<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no">


<title>X-Stream Sync Player V4</title>


<style>


html,
body{


margin:0;

padding:0;

width:100%;

height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:white;


}





/* =====================================
   VIDEO
===================================== */


#mediaVideo{


position:fixed;

top:0;

left:0;


width:100%;

height:100%;


background:#000;


object-fit:contain;


z-index:10;


}





/* =====================================
   STATUS
===================================== */


#status{


position:fixed;


top:20px;

left:20px;


background:rgba(0,0,0,.75);


padding:15px 20px;


border-radius:10px;


z-index:9999;


transition:.4s;


}



#statusTitle{


font-size:24px;


font-weight:bold;


}



#statusMessage{


font-size:18px;


margin-top:5px;


}







/* =====================================
   AGUARDANDO
===================================== */


#waiting{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;


z-index:5000;


font-size:28px;


}




.loader{


width:55px;


height:55px;


border-radius:50%;


border:6px solid #555;


border-top-color:white;


animation:spin 1s linear infinite;


margin-bottom:25px;


}




@keyframes spin{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}






/* =====================================
   ERRO
===================================== */


#errorBox{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:none;


align-items:center;


justify-content:center;


flex-direction:column;


text-align:center;


z-index:20000;


}




#errorTitle{


font-size:40px;


}



#errorMessage{


font-size:22px;


max-width:80%;


}





/* =====================================
   TV REMOTE
===================================== */


*{


-webkit-tap-highlight-color:transparent;


}



video{


outline:none;


}



</style>


</head>


<body>





<!-- PLAYER -->

<video

id="mediaVideo"

playsinline

webkit-playsinline

preload="auto"

>

</video>








<!-- STATUS -->


<div id="status">


<div id="statusTitle">

X-Stream

</div>


<div id="statusMessage">

Conectando...

</div>


</div>








<!-- AGUARDANDO -->


<div id="waiting">


<div class="loader"></div>


<div>

Aguardando transmissão...

</div>


</div>







<!-- ERRO -->


<div id="errorBox">


<div id="errorTitle">

Erro

</div>


<div id="errorMessage">

Não foi possível reproduzir.

</div>


</div>






<script>


// =====================================
// X-STREAM PLAYER V4 ENGINE
// =====================================


// URL DO SERVIDOR RENDER

const servidor =
"https://x-stream-56ya.onrender.com";



const mediaVideo =
document.getElementById("mediaVideo");



let ultimoVideo = -1;

let urlAtual = "";

let carregando = false;

let ultimoSeekServidor = 0;





// =====================================
// STATUS
// =====================================


function status(titulo,msg){


document.getElementById(
"statusTitle"
).innerHTML=titulo;


document.getElementById(
"statusMessage"
).innerHTML=msg;


}






function esconderAguardando(){


document.getElementById(
"waiting"
).style.display="none";


}




// =====================================
// BUSCAR ESTADO
// =====================================


function sincronizar(){



fetch(
servidor+"/status"
)


.then(r=>r.json())


.then(dados=>{



processarEstado(dados);



})


.catch(()=>{


status(
"X-Stream",
"Sem conexão"
);


});



}








// =====================================
// PROCESSAR SERVIDOR
// =====================================


function processarEstado(dados){



if(!dados.ativo){


status(
"X-Stream",
"Aguardando transmissão..."
);


return;


}





// NOVO VÍDEO


if(
dados.fila &&
dados.fila.length
){



let item =
dados.fila[dados.atual];



if(item){


if(
ultimoVideo !== dados.atual ||
urlAtual !== item.url
){



ultimoVideo =
dados.atual;


carregarVideo(
item.url
);



}



}



}








// ESTADO PLAY / PAUSE


if(
dados.estado === "playing"
){


sincronizarPlay();



}





if(
dados.estado === "paused"
){


sincronizarPause();



}






// TEMPO GLOBAL


if(
typeof dados.posicao === "number"
){



sincronizarTempo(
dados.posicao
);



}



}








// =====================================
// CARREGAR VÍDEO
// =====================================


function carregarVideo(url){



if(carregando){

return;

}



carregando=true;


urlAtual=url;



status(
"X-Stream",
"Carregando vídeo..."
);




mediaVideo.src=url;


mediaVideo.load();





mediaVideo.onloadeddata=function(){



carregando=false;



esconderAguardando();



status(
"X-Stream",
"Pronto"
);



};



mediaVideo.onerror=function(){



carregando=false;



status(
"X-Stream",
"Erro no vídeo"
);



};




}








// =====================================
// PLAY GLOBAL
// =====================================


function sincronizarPlay(){



if(
mediaVideo.readyState>0 &&
mediaVideo.paused
){


mediaVideo.play()

.catch(()=>{});


}



}









// =====================================
// PAUSE GLOBAL
// =====================================


function sincronizarPause(){



if(
!mediaVideo.paused
){


mediaVideo.pause();


}



}









// =====================================
// SINCRONIZA TEMPO
// =====================================


function sincronizarTempo(valor){



if(
!mediaVideo.duration
){

return;

}




let diferenca =
Math.abs(
mediaVideo.currentTime - valor
);




// só corrige se realmente estiver atrasado

if(
diferenca > 5
){


if(
Date.now()-ultimoSeekServidor > 3000
){


ultimoSeekServidor =
Date.now();



mediaVideo.currentTime =
valor;



}


}



}









// =====================================
// ENVIAR POSIÇÃO REAL
// =====================================


setInterval(function(){



if(
!mediaVideo.paused &&
mediaVideo.currentTime
){



fetch(
servidor+"/atualizar-posicao",
{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify({


posicao:

mediaVideo.currentTime


})


}

);



}



},3000);









// =====================================
// CONTROLES
// =====================================


function comando(acao,valor){



let dados={

acao:acao

};



if(valor!==undefined){


dados.valor=valor;


}





fetch(
servidor+"/controle",
{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify(dados)


}

);



}









// PLAY / PAUSE

function playPause(){



if(mediaVideo.paused){


comando("play");


}else{


comando(
"pause",
mediaVideo.currentTime
);


}



}








// AVANÇAR

function avancar(){


comando(
"seek",
mediaVideo.currentTime+10
);


}






// VOLTAR

function voltar(){



let t =
mediaVideo.currentTime-10;


if(t<0){

t=0;

}


comando(
"seek",
t
);



}








// PRÓXIMO

function proximo(){


comando(
"next"
);


}





// ANTERIOR

function anterior(){


comando(
"previous"
);


}









// =====================================
// CONTROLE REMOTO TV
// =====================================


document.onkeydown=function(e){



switch(e.keyCode){



case 13:

playPause();

break;



case 32:

playPause();

break;



case 39:

avancar();

break;



case 37:

voltar();

break;



case 34:

proximo();

break;



case 33:

anterior();

break;



}



};









// =====================================
// CLIQUE
// =====================================


mediaVideo.onclick=function(){


playPause();


};







// =====================================
// INICIAR
// =====================================


status(
"X-Stream",
"Conectando..."
);



sincronizar();



setInterval(

sincronizar,

2000

);

</script>
</body>
</html>
