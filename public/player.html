<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>X-Stream Sync Player</title>


<style>


/* =====================================
   X-STREAM SYNC PLAYER V2
===================================== */


html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:white;

}



/* =====================================
   VIDEO PRINCIPAL
===================================== */


#mediaVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

display:block;

z-index:10;

}



/* =====================================
   CONTROLES NATIVOS
===================================== */


video{

outline:none;

}



/* =====================================
   STATUS X-STREAM
===================================== */


#status{


position:fixed;


top:20px;

left:20px;


background:rgba(0,0,0,.75);


padding:15px 20px;


border-radius:10px;


z-index:9999;


transition:.5s;


}



#statusTitle{


font-size:24px;

font-weight:bold;


}



#statusMessage{


font-size:18px;


margin-top:5px;


}




/* =====================================
   AGUARDANDO
===================================== */


#waiting{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;


font-size:28px;


z-index:5000;


}



.loader{


width:50px;

height:50px;


border-radius:50%;


border:5px solid #555;


border-top-color:white;


animation:load 1s linear infinite;


margin-bottom:20px;


}



@keyframes load{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}




/* =====================================
   ERRO
===================================== */


#errorBox{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:none;


align-items:center;


justify-content:center;


flex-direction:column;


z-index:20000;


text-align:center;


}



#errorTitle{


font-size:40px;


}



#errorMessage{


font-size:22px;


max-width:80%;


}





/* =====================================
   TV / CONTROLE REMOTO
===================================== */


*{


-webkit-tap-highlight-color:transparent;


}



</style>


</head>


<body>



<!-- PLAYER PRINCIPAL -->


<video

id="mediaVideo"

controls

playsinline

webkit-playsinline

preload="auto"

>

</video>




<!-- STATUS -->


<div id="status">


<div id="statusTitle">

X-Stream

</div>


<div id="statusMessage">

Conectando...

</div>


</div>




<!-- TELA AGUARDANDO -->


<div id="waiting">


<div class="loader"></div>


<div>

Aguardando transmissão...

</div>


</div>





<!-- ERRO -->


<div id="errorBox">


<div id="errorTitle">

Erro

</div>


<div id="errorMessage">

Não foi possível reproduzir.

</div>


</div>





<script>

// =====================================
// X-STREAM SYNC ENGINE V2
// CONEXÃO COM SERVIDOR
// =====================================


var servidorEstado = null;

var ultimaAtualizacao = 0;

var ultimoVideo = -1;



// =====================================
// BUSCAR ESTADO DO SERVIDOR
// =====================================


function sincronizarServidor(){


    var xhr = new XMLHttpRequest();


    xhr.open(
        "GET",
        "/status",
        true
    );



    xhr.onreadystatechange=function(){


        if(
            xhr.readyState === 4 &&
            xhr.status === 200
        ){


            try{


                var dados =
                JSON.parse(
                    xhr.responseText
                );


                processarEstado(
                    dados
                );



            }catch(e){



            }


        }


    };



    xhr.send();



}




// =====================================
// PROCESSAR ESTADO GLOBAL
// =====================================


function processarEstado(dados){



    servidorEstado = dados;



    if(!dados.ativo){

        mostrarStatus(
            "X-Stream",
            "Aguardando transmissão..."
        );

        return;

    }



    /*
       VERIFICA SE MUDOU O VÍDEO
    */


    if(
        dados.fila &&
        dados.fila.length > 0
    ){


        if(
            ultimoVideo != dados.atual
        ){


            ultimoVideo =
            dados.atual;



            var item =
            dados.fila[dados.atual];



            if(item && item.url){


                carregarVideoServidor(
                    item.url
                );


            }


        }


    }





    /*
       SINCRONIZA PLAY / PAUSE
    */


    if(
        dados.estado === "playing"
    ){


        sincronizarPlay();


    }



    if(
        dados.estado === "paused"
    ){


        sincronizarPause();


    }



    /*
       SINCRONIZA TEMPO
    */


    if(
        typeof dados.posicao === "number"
    ){


        sincronizarTempo(
            dados.posicao
        );


    }



}






// =====================================
// CARREGAR VÍDEO DO SERVIDOR
// =====================================


function carregarVideoServidor(url){



    if(
        mediaVideo.src === url
    ){

        return;

    }



    mostrarStatus(
        "X-Stream",
        "Carregando vídeo..."
    );



    mediaVideo.src =
    url;



    mediaVideo.load();



}






// =====================================
// PLAY GLOBAL
// =====================================


function sincronizarPlay(){



    if(
        mediaVideo.paused
    ){


        mediaVideo.play()
        .catch(function(){});


    }



}






// =====================================
// PAUSE GLOBAL
// =====================================


function sincronizarPause(){



    if(
        !mediaVideo.paused
    ){


        mediaVideo.pause();


    }


}






// =====================================
// SINCRONIZAR TEMPO
// =====================================


function sincronizarTempo(valor){



    if(
        !mediaVideo.duration
    ){

        return;

    }



    /*
       evita ficar pulando toda hora
    */


    var diferenca =
    Math.abs(
        mediaVideo.currentTime -
        valor
    );



    if(
        diferenca > 3
    ){


        mediaVideo.currentTime =
        valor;


    }



}






// =====================================
// INICIAR SINCRONIZAÇÃO
// =====================================


setInterval(
    sincronizarServidor,
    2000
);

// =====================================
// X-STREAM REMOTE CONTROL V2
// CONTROLE TV / TECLADO
// =====================================



// =====================================
// ENVIAR COMANDO PARA SERVIDOR
// =====================================


function enviarComando(acao,valor){



    var xhr =
    new XMLHttpRequest();



    xhr.open(
        "POST",
        "/controle",
        true
    );



    xhr.setRequestHeader(
        "Content-Type",
        "application/json"
    );



    var dados = {

        acao:acao

    };



    if(valor !== undefined){


        dados.valor = valor;


    }



    xhr.send(
        JSON.stringify(dados)
    );



}






// =====================================
// PLAY / PAUSE LOCAL
// =====================================


function alternarPlay(){


    if(
        mediaVideo.paused
    ){


        enviarComando(
            "play"
        );


    }else{


        enviarComando(
            "pause",
            mediaVideo.currentTime
        );


    }


}






// =====================================
// AVANÇAR TEMPO
// =====================================


function avancar(){



    var tempo =
    mediaVideo.currentTime + 10;



    enviarComando(
        "seek",
        tempo
    );


}






// =====================================
// VOLTAR TEMPO
// =====================================


function voltar(){



    var tempo =
    mediaVideo.currentTime - 10;



    if(tempo < 0){

        tempo=0;

    }



    enviarComando(
        "seek",
        tempo
    );


}






// =====================================
// VOLUME
// =====================================


function aumentarVolume(){


    var v =
    mediaVideo.volume + 0.1;



    if(v>1){

        v=1;

    }



    enviarComando(
        "volume",
        v
    );


}






function diminuirVolume(){



    var v =
    mediaVideo.volume - 0.1;



    if(v<0){

        v=0;

    }



    enviarComando(
        "volume",
        v
    );


}






// =====================================
// PRÓXIMO VÍDEO
// =====================================


function proximo(){



    enviarComando(
        "next"
    );


}






// =====================================
// VÍDEO ANTERIOR
// =====================================


function anterior(){



    enviarComando(
        "previous"
    );


}






// =====================================
// CONTROLE REMOTO TV
// =====================================


document.onkeydown=function(e){



    var tecla =
    e.keyCode;



    switch(tecla){



        // ENTER / OK

        case 13:

            alternarPlay();

        break;



        // ESPAÇO

        case 32:

            alternarPlay();

        break;




        // SETA DIREITA

        case 39:

            avancar();

        break;



        // SETA ESQUERDA

        case 37:

            voltar();

        break;




        // SETA CIMA

        case 38:

            aumentarVolume();

        break;




        // SETA BAIXO

        case 40:

            diminuirVolume();

        break;



        // PAGE DOWN / NEXT

        case 34:

            proximo();

        break;



        // PAGE UP / PREVIOUS

        case 33:

            anterior();

        break;



    }



};






// =====================================
// CLIQUES DO MOUSE / TOUCH
// =====================================


mediaVideo.onclick=function(){


    alternarPlay();


};




</script>



</body>

</html>
