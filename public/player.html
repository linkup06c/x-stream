<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X-Stream Player V4</title>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial;

}


#video{

width:100%;
height:100%;

object-fit:contain;

background:#000;

display:none;

}



#status{

position:fixed;

top:20px;
left:20px;

background:rgba(0,0,0,.7);

padding:15px 20px;

border-radius:10px;

color:white;

font-size:22px;

z-index:10;

}



#aguarde{

position:fixed;

width:100%;
height:100%;

display:flex;

align-items:center;
justify-content:center;

flex-direction:column;

color:white;

font-size:28px;

}



.loader{

width:50px;
height:50px;

border-radius:50%;

border:5px solid #555;

border-top-color:white;

animation:girar 1s linear infinite;

margin-bottom:20px;

}



@keyframes girar{

100%{

transform:rotate(360deg);

}

}


</style>

</head>


<body>



<video

id="video"

autoplay

playsinline

webkit-playsinline

preload="auto"

></video>




<div id="status">

X-Stream

</div>



<div id="aguarde">

<div class="loader"></div>

Aguardando transmissão...

</div>






<script>


const video =
document.getElementById("video");

const status =
document.getElementById("status");

const aguarde =
document.getElementById("aguarde");



let videoAtual="";

let indiceAtual=-1;





function mostrarStatus(texto){

status.innerHTML =
"X-Stream<br>"+texto;

}




// =====================================
// BUSCAR SERVIDOR
// =====================================


function atualizar(){


fetch("/status")

.then(r=>r.json())

.then(dados=>{


if(
!dados.ativo ||
!dados.fila.length
){


mostrarStatus(
"Aguardando transmissão..."
);


return;


}



let item =
dados.fila[dados.atual];



if(!item){

return;

}



if(
item.url !== videoAtual
){


videoAtual =
item.url;


indiceAtual =
dados.atual;



carregar(
item.url
);


}



});


}






// =====================================
// CARREGAR VÍDEO
// =====================================


function carregar(url){



mostrarStatus(
"Carregando vídeo..."
);



aguarde.style.display="flex";

video.style.display="none";



video.pause();


video.removeAttribute(
"src"
);


video.load();



video.src=url;


video.load();



}







// =====================================
// QUANDO PRONTO
// =====================================


video.oncanplay=function(){



video.style.display="block";


aguarde.style.display="none";



video.play()

.catch(()=>{


mostrarStatus(
"Aguardando reprodução..."
);


});


};







// =====================================
// REPRODUZINDO
// =====================================


video.onplaying=function(){


status.style.display="none";


};








// =====================================
// ERRO
// =====================================


video.onerror=function(){


mostrarStatus(
"Erro no vídeo"
);


};







// =====================================
// TERMINOU
// =====================================


video.onended=function(){



mostrarStatus(
"Próximo vídeo..."
);



fetch("/terminou",{

method:"POST"

})

.then(()=>{


videoAtual="";


atualizar();


});


};







// =====================================
// CONTROLE REMOTO
// =====================================


document.onkeydown=function(e){


if(e.keyCode===34){

proximo();

}


if(e.keyCode===33){

anterior();

}


};





function proximo(){


fetch("/next",{

method:"POST"

});


}




function anterior(){


fetch("/previous",{

method:"POST"

});


}




// =====================================
// INICIALIZAÇÃO
// =====================================


mostrarStatus(
"Conectando..."
);



atualizar();



setInterval(

atualizar,

3000

);



</script>


</body>

</html>
