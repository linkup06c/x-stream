<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">


<title>X-Stream TV Player</title>


<style>


html,
body{

margin:0;

padding:0;

width:100%;

height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:#fff;

}




/* VIDEO */

#mediaVideo{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#000;

object-fit:contain;

display:none;

z-index:10;

}




/* STATUS */

#status{


position:fixed;


top:20px;

left:20px;


background:rgba(0,0,0,.75);


padding:15px 20px;


border-radius:10px;


font-size:22px;


z-index:9999;


}




/* AGUARDANDO */


#waiting{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;


font-size:28px;


z-index:5000;


}




.loader{


width:55px;


height:55px;


border-radius:50%;


border:6px solid #555;


border-top-color:#fff;


animation:spin 1s linear infinite;


margin-bottom:25px;


}




@keyframes spin{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}





/* ERRO */


#errorBox{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:none;


align-items:center;


justify-content:center;


flex-direction:column;


font-size:28px;


z-index:20000;


text-align:center;


}





*{

-webkit-tap-highlight-color:transparent;

}



</style>


</head>



<body>




<video

id="mediaVideo"

autoplay

playsinline

webkit-playsinline

preload="auto">

</video>





<div id="status">

X-Stream<br>

Conectando...

</div>





<div id="waiting">


<div class="loader"></div>


Aguardando transmissão...


</div>






<div id="errorBox">


Erro ao reproduzir vídeo


</div>
<script>


// =====================================
// X-STREAM PLAYER ENGINE
// BASE COMPATÍVEL TV / WEBVIEW
// =====================================


var mediaVideo =
document.getElementById("mediaVideo");


var status =
document.getElementById("status");


var waiting =
document.getElementById("waiting");


var errorBox =
document.getElementById("errorBox");



var urlAtual = "";

var ultimaURLServidor = "";






// =====================================
// STATUS
// =====================================


function mostrarStatus(msg){


status.innerHTML =
"X-Stream<br>"+msg;


status.style.display="block";


}



function esconderStatus(){


status.style.display="none";


}








// =====================================
// CARREGAR VÍDEO
// =====================================


function receberVideo(url){



if(!url){

return;

}



if(url === urlAtual){

return;

}



urlAtual=url;



mostrarStatus(
"Carregando vídeo..."
);



waiting.style.display="flex";

mediaVideo.style.display="none";



try{


mediaVideo.pause();


mediaVideo.removeAttribute("src");


mediaVideo.load();



}catch(e){}





mediaVideo.src=url;


mediaVideo.load();



}









// =====================================
// VÍDEO PRONTO
// =====================================


mediaVideo.oncanplay=function(){



mediaVideo.style.display="block";


waiting.style.display="none";



var tentativa =
mediaVideo.play();



if(tentativa){


tentativa.then(function(){


esconderStatus();


}).catch(function(){


mostrarStatus(
"Aguardando reprodução..."
);


});


}



};









// =====================================
// TOCANDO
// =====================================


mediaVideo.onplaying=function(){


waiting.style.display="none";


esconderStatus();


};









// =====================================
// ERRO
// =====================================


mediaVideo.onerror=function(){



errorBox.style.display="flex";


mostrarStatus(
"Erro no vídeo"
);



};








// =====================================
// BUSCAR SERVIDOR
// IGUAL PLAYER ANTIGO
// =====================================


function verificarServidor(){



var xhr =
new XMLHttpRequest();



xhr.open(

"GET",

"/status",

true

);





xhr.onreadystatechange=function(){



if(

xhr.readyState===4 &&

xhr.status===200

){



try{



var dados =
JSON.parse(
xhr.responseText
);





var url="";





// SERVIDOR NOVO

if(

dados.fila &&

dados.fila.length > 0

){



var item =
dados.fila[dados.atual];



if(item){

url=item.url;

}



}





// COMPATIBILIDADE ANTIGO

if(

!url && dados.video

){


url=dados.video;


}







if(

dados.ativo && url

){



if(

url !== ultimaURLServidor

){



ultimaURLServidor=url;


receberVideo(url);



}



}else{



mostrarStatus(
"Aguardando transmissão..."
);



}




}catch(e){



}




}



};



xhr.send();



}








// =====================================
// INICIAR
// =====================================


mostrarStatus(
"Conectando..."
);



verificarServidor();



setInterval(

verificarServidor,

3000

);
// =====================================
// QUANDO TERMINAR O VÍDEO
// =====================================


mediaVideo.onended=function(){


mostrarStatus(
"Próximo vídeo..."
);



enviarComando(
"next"
);



};







// =====================================
// COMANDO PARA SERVIDOR
// =====================================


function enviarComando(acao){



var xhr =
new XMLHttpRequest();



xhr.open(

"POST",

"/controle",

true

);



xhr.setRequestHeader(

"Content-Type",

"application/json"

);



xhr.send(

JSON.stringify({

acao:acao

})

);



}








// =====================================
// PRÓXIMO
// =====================================


function proximo(){


enviarComando(
"next"
);


}








// =====================================
// ANTERIOR
// =====================================


function anterior(){


enviarComando(
"previous"
);


}








// =====================================
// CONTROLE REMOTO TV
// =====================================


document.onkeydown=function(e){



var tecla =
e.keyCode;



switch(tecla){



case 34:

// PAGE DOWN

proximo();

break;



case 33:

// PAGE UP

anterior();

break;



}



};








// =====================================
// CLIQUE NO VÍDEO
// =====================================


mediaVideo.onclick=function(){



if(mediaVideo.paused){


mediaVideo.play();



}else{


mediaVideo.pause();



}



};







// =====================================
// INTERNET
// =====================================


window.ononline=function(){


mostrarStatus(
"Reconectando..."
);



verificarServidor();


};





window.onoffline=function(){


mostrarStatus(
"Sem conexão"
);


};







</script>


</body>


</html>
