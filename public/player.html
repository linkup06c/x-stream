<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X-Stream Player</title>

<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,sans-serif;

}


video{

width:100%;
height:100%;

object-fit:contain;

background:#000;

display:none;

}


#status{

position:fixed;

top:20px;
left:20px;

background:rgba(0,0,0,.75);

color:white;

padding:15px;

border-radius:10px;

font-size:22px;

z-index:10;

}



#waiting{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

display:flex;

align-items:center;
justify-content:center;

flex-direction:column;

background:#000;

color:white;

font-size:28px;

}



.loader{

width:50px;

height:50px;

border-radius:50%;

border:5px solid #555;

border-top-color:white;

animation:girar 1s linear infinite;

margin-bottom:20px;

}


@keyframes girar{

100%{

transform:rotate(360deg);

}

}


</style>

</head>


<body>



<video

id="video"

autoplay

playsinline

webkit-playsinline

preload="auto">

</video>




<div id="status">

X-Stream<br>
Conectando...

</div>



<div id="waiting">

<div class="loader"></div>

Aguardando transmissão...

</div>





<script>


// =============================
// CONFIGURAÇÃO
// =============================


const servidor = 
"https://x-stream-56ya.onrender.com";



const video =
document.getElementById("video");


const status =
document.getElementById("status");


const waiting =
document.getElementById("waiting");



let urlAtual="";





function mostrar(msg){

status.innerHTML =
"X-Stream<br>"+msg;

status.style.display="block";

}



function esconderStatus(){

status.style.display="none";

}






// =============================
// BUSCAR SERVIDOR
// =============================


function verificar(){


fetch(
servidor+"/status"
)

.then(res=>res.json())

.then(dados=>{


console.log(dados);



if(
!dados.ativo ||
!dados.fila ||
!dados.fila.length
){

mostrar(
"Aguardando transmissão..."
);

return;

}




let item =
dados.fila[dados.atual];



if(!item){

return;

}




let url=item.url;



if(
url &&
url!==urlAtual
){


urlAtual=url;


carregarVideo(url);


}



})


.catch(()=>{


mostrar(
"Erro de conexão"
);


});


}








// =============================
// CARREGAR VÍDEO
// =============================


function carregarVideo(url){



mostrar(
"Carregando vídeo..."
);



waiting.style.display="flex";

video.style.display="none";



video.pause();


video.src="";


video.load();



video.src=url;


video.load();



}








// =============================
// VÍDEO PRONTO
// =============================


video.oncanplay=function(){



video.style.display="block";


waiting.style.display="none";



video.play()

.then(()=>{


esconderStatus();


})

.catch(()=>{


mostrar(
"Aguardando reprodução..."
);


});


};







// =============================
// TOCANDO
// =============================


video.onplaying=function(){


esconderStatus();


};







// =============================
// ERRO
// =============================


video.onerror=function(){


mostrar(
"Erro ao reproduzir vídeo"
);


};








// =============================
// FINAL DO VÍDEO
// =============================


video.onended=function(){



mostrar(
"Próximo vídeo..."
);



fetch(
servidor+"/terminou",
{

method:"POST"

}

)

.then(()=>{


urlAtual="";


verificar();


});


};








// =============================
// CONTROLE TV
// =============================


document.onkeydown=function(e){


if(e.keyCode===34){

proximo();

}


if(e.keyCode===33){

anterior();

}


};






function proximo(){


fetch(
servidor+"/controle",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

acao:"next"

})

}

);


}



function anterior(){


fetch(
servidor+"/controle",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

acao:"previous"

})

}

);


}






// =============================
// INÍCIO
// =============================


mostrar(
"Conectando..."
);


verificar();



setInterval(

verificar,

3000

);



</script>


</body>

</html>
