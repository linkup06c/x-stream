<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>X-Stream Sync Player V3</title>


<style>


html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:white;

}


/* =====================================
   VIDEO
===================================== */


#mediaVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

z-index:10;

}



/* =====================================
   STATUS
===================================== */


#status{

position:fixed;

top:20px;

left:20px;

background:rgba(0,0,0,.75);

padding:15px 20px;

border-radius:10px;

z-index:9999;

transition:.5s;

}



#statusTitle{

font-size:24px;

font-weight:bold;

}



#statusMessage{

font-size:18px;

margin-top:5px;

}




/* =====================================
   TELA ESPERA
===================================== */


#waiting{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;


background:#000;


display:flex;

align-items:center;

justify-content:center;

flex-direction:column;


font-size:28px;


z-index:5000;

}



.loader{


width:55px;

height:55px;


border-radius:50%;


border:6px solid #555;


border-top-color:white;


animation:spin 1s linear infinite;


margin-bottom:25px;


}



@keyframes spin{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}





/* =====================================
   ERRO
===================================== */


#errorBox{


position:fixed;

top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:none;


align-items:center;

justify-content:center;


flex-direction:column;


text-align:center;


z-index:20000;


}



#errorTitle{


font-size:40px;


}



#errorMessage{


font-size:22px;


max-width:80%;


}



/* =====================================
   CONTROLE TV
===================================== */


video,
button{

outline:none;

}



*{

-webkit-tap-highlight-color:transparent;

}



</style>


</head>



<body>


<!-- PLAYER PRINCIPAL -->

<video

id="mediaVideo"

autoplay

controls

playsinline

webkit-playsinline

preload="auto"

>

</video>





<!-- STATUS -->

<div id="status">


<div id="statusTitle">

X-Stream

</div>


<div id="statusMessage">

Conectando...

</div>


</div>





<!-- ESPERA -->

<div id="waiting">


<div class="loader"></div>


<div>

Aguardando transmissão...

</div>


</div>





<!-- ERRO -->

<div id="errorBox">


<div id="errorTitle">

Erro

</div>


<div id="errorMessage">

Não foi possível reproduzir.

</div>


</div>





<script>
// =====================================
// X-STREAM SYNC PLAYER V3
// ENGINE PRINCIPAL
// =====================================



var servidor = 
"https://x-stream-56ya.onrender.com";



var mediaVideo =
document.getElementById("mediaVideo");


var waiting =
document.getElementById("waiting");


var statusBox =
document.getElementById("status");


var statusMessage =
document.getElementById("statusMessage");



var ultimoVideo = "";

var estadoAtual = "";

var ultimaPosicao = 0;




// =====================================
// STATUS
// =====================================


function mostrarStatus(titulo,msg){


document.getElementById(
"statusTitle"
).innerHTML = titulo;


statusMessage.innerHTML = msg;


statusBox.style.display="block";


}




function esconderStatus(){


statusBox.style.display="none";


}





// =====================================
// BUSCAR SERVIDOR
// =====================================


function sincronizarServidor(){



fetch(
servidor+"/status"
)


.then(function(res){

return res.json();

})


.then(function(dados){



processarEstado(
dados
);



})


.catch(function(){


mostrarStatus(
"X-Stream",
"Servidor offline..."
);



});



}







// =====================================
// PROCESSAR ESTADO GLOBAL
// =====================================


function processarEstado(dados){



if(!dados.ativo){


mostrarStatus(
"X-Stream",
"Aguardando transmissão..."
);


return;


}





// PEGAR VÍDEO ATUAL


if(
dados.fila &&
dados.fila.length > 0
){



var item =
dados.fila[dados.atual || 0];



if(
item &&
item.url
){



if(
ultimoVideo !== item.url
){


ultimoVideo =
item.url;



carregarVideo(
item.url
);



}



}



}






// SINCRONIZAR ESTADO



if(
dados.estado === "playing"
){


sincronizarPlay();


}



if(
dados.estado === "paused"
){


sincronizarPause();


}




// TEMPO


if(
typeof dados.posicao === "number"
){


sincronizarTempo(
dados.posicao
);


}



}







// =====================================
// CARREGAR VÍDEO
// =====================================


function carregarVideo(url){



mostrarStatus(
"X-Stream",
"Carregando vídeo..."
);



mediaVideo.src =
url;


mediaVideo.load();



mediaVideo.play()
.catch(function(){});



}





// =====================================
// PLAY
// =====================================


function sincronizarPlay(){



if(
mediaVideo.paused
){



mediaVideo.play()
.catch(function(){});



}



}







// =====================================
// PAUSE
// =====================================


function sincronizarPause(){



if(
!mediaVideo.paused
){


mediaVideo.pause();


}



}






// =====================================
// SINCRONIZAR TEMPO
// =====================================


function sincronizarTempo(valor){



if(
!mediaVideo.duration
){

return;

}



var diferenca =
Math.abs(
mediaVideo.currentTime - valor
);



if(
diferenca > 3
){


mediaVideo.currentTime =
valor;


}



}







// =====================================
// EVENTOS DO VÍDEO
// =====================================



mediaVideo.onplaying=function(){



waiting.style.display="none";


esconderStatus();



};



mediaVideo.onwaiting=function(){



mostrarStatus(
"X-Stream",
"Carregando..."
);



};



mediaVideo.onerror=function(){



mostrarStatus(
"X-Stream",
"Erro ao carregar vídeo"
);



};







// =====================================
// INICIAR
// =====================================


mostrarStatus(
"X-Stream",
"Conectando..."
);



sincronizarServidor();



setInterval(

sincronizarServidor,

2000

);

// =====================================
// X-STREAM REMOTE CONTROL V3
// CONTROLES GLOBAIS
// =====================================




// =====================================
// ENVIAR COMANDO SERVIDOR
// =====================================


function enviarComando(acao,valor){



var dados = {

acao:acao

};



if(valor !== undefined){


dados.valor = valor;


}



fetch(

servidor+"/controle",

{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:

JSON.stringify(dados)



}


)

.catch(function(){



});



}








// =====================================
// PLAY / PAUSE
// =====================================


function alternarPlay(){



if(
mediaVideo.paused
){


enviarComando(
"play"
);



}else{


enviarComando(
"pause",
mediaVideo.currentTime
);



}



}








// =====================================
// AVANÇAR
// =====================================


function avancar(){



var tempo =

mediaVideo.currentTime + 10;



enviarComando(

"seek",

tempo

);



}







// =====================================
// VOLTAR
// =====================================


function voltar(){



var tempo =

mediaVideo.currentTime - 10;



if(
tempo < 0
){

tempo = 0;

}



enviarComando(

"seek",

tempo

);



}








// =====================================
// PRÓXIMO
// =====================================


function proximo(){



enviarComando(

"next"

);



}







// =====================================
// ANTERIOR
// =====================================


function anterior(){



enviarComando(

"previous"

);



}








// =====================================
// CONTROLE REMOTO TV
// =====================================


document.onkeydown=function(e){



var tecla =
e.keyCode;



switch(tecla){



// ENTER / OK

case 13:


alternarPlay();


break;





// ESPAÇO

case 32:


alternarPlay();


break;





// DIREITA

case 39:


avancar();


break;





// ESQUERDA

case 37:


voltar();


break;





// PAGE DOWN

case 34:


proximo();


break;





// PAGE UP

case 33:


anterior();


break;



}



};








// =====================================
// CLIQUE NO VÍDEO
// =====================================


mediaVideo.onclick=function(){


alternarPlay();


};








// =====================================
// RECUPERAÇÃO AUTOMÁTICA
// =====================================


window.ononline=function(){


mostrarStatus(

"X-Stream",

"Internet restaurada"

);


sincronizarServidor();


};




window.onoffline=function(){



mostrarStatus(

"X-Stream",

"Sem conexão"

);



};




</script>


</body>


</html>
