<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>X-Stream Player TV</title>

<style>

html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:white;

}


#mediaVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

display:none;

z-index:10;

}



#status{

position:fixed;

top:20px;
left:20px;

background:rgba(0,0,0,.75);

padding:15px 20px;

border-radius:10px;

font-size:20px;

z-index:9999;

}



#waiting{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

font-size:28px;

z-index:5000;

}



.loader{

width:55px;

height:55px;

border-radius:50%;

border:6px solid #555;

border-top-color:white;

animation:spin 1s linear infinite;

margin-bottom:25px;

}



@keyframes spin{

from{

transform:rotate(0deg);

}

to{

transform:rotate(360deg);

}

}



#errorBox{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

align-items:center;

justify-content:center;

flex-direction:column;

z-index:20000;

font-size:25px;

text-align:center;

}



*{

-webkit-tap-highlight-color:transparent;

}


</style>

</head>


<body>


<video

id="mediaVideo"

autoplay

playsinline

webkit-playsinline

preload="auto">

</video>



<div id="status">

X-Stream<br>

Conectando...

</div>



<div id="waiting">

<div class="loader"></div>

Aguardando transmissão...

</div>



<div id="errorBox">

<div>

Erro ao reproduzir vídeo

</div>

</div>

<script>


// =====================================
// X-STREAM PLAYER ENGINE
// COMPATÍVEL COM SERVIDOR V3
// =====================================


const servidor = "https://x-stream-56ya.onrender.com";


const mediaVideo =
document.getElementById("mediaVideo");


const waiting =
document.getElementById("waiting");


const status =
document.getElementById("status");


const errorBox =
document.getElementById("errorBox");



let urlAtual = "";

let indiceAtual = -1;

let primeiraCarga = true;





// =====================================
// STATUS
// =====================================


function mostrarStatus(msg){


status.innerHTML =
"X-Stream<br>"+msg;


status.style.display="block";


}



function esconderStatus(){


status.style.display="none";


}






// =====================================
// CARREGAR VÍDEO
// =====================================


function carregarVideo(url){


if(!url){

return;

}



// impede recarregar o mesmo link

if(urlAtual === url){

return;

}



urlAtual=url;



mostrarStatus(
"Carregando vídeo..."
);



waiting.style.display="flex";

mediaVideo.style.display="none";



try{


mediaVideo.pause();


mediaVideo.removeAttribute("src");


mediaVideo.load();



}catch(e){}




mediaVideo.src=url;


mediaVideo.load();



}







// =====================================
// QUANDO ESTIVER PRONTO
// =====================================


mediaVideo.oncanplay=function(){



mediaVideo.style.display="block";


waiting.style.display="none";



mediaVideo.play()

.then(()=>{


esconderStatus();


})

.catch(()=>{


mostrarStatus(
"Aguardando reprodução..."
);


});



};








// =====================================
// TOCANDO
// =====================================


mediaVideo.onplaying=function(){


esconderStatus();


waiting.style.display="none";


};







// =====================================
// ERRO
// =====================================


mediaVideo.onerror=function(){



errorBox.style.display="flex";


mostrarStatus(
"Erro no vídeo"
);



};









// =====================================
// BUSCAR STATUS DO SERVIDOR
// =====================================


function verificarServidor(){



fetch(
servidor+"/status"
)

.then(res=>res.json())

.then(dados=>{


console.log("STATUS",dados);




if(!dados.ativo){


mostrarStatus(
"Aguardando transmissão..."
);


return;

}






let item=null;




// servidor com fila

if(
dados.fila &&
dados.fila.length > 0
){


item =
dados.fila[dados.atual];


}






// compatibilidade servidor antigo

let url="";



if(item && item.url){


url=item.url;


}

else if(dados.video){


url=dados.video;


}






if(url){



if(url !== urlAtual){



indiceAtual =
dados.atual;



carregarVideo(url);



}



}




})

.catch(()=>{


mostrarStatus(
"Conectando..."
);


});



}








// =====================================
// INICIAR MONITORAMENTO
// =====================================


mostrarStatus(
"Conectando..."
);



verificarServidor();



setInterval(

verificarServidor,

3000

);

// =====================================
// QUANDO O VÍDEO TERMINAR
// AVANÇA AUTOMATICAMENTE
// =====================================


mediaVideo.onended=function(){


    enviarComando("next");


};







// =====================================
// ENVIAR COMANDO SERVIDOR
// =====================================


function enviarComando(acao){



fetch(

servidor+"/controle",

{

method:"POST",

headers:{

"Content-Type":

"application/json"

},

body:JSON.stringify({

acao:acao

})

}

)

.then(()=>{


setTimeout(

verificarServidor,

1000

);


});



}






// =====================================
// PRÓXIMO VÍDEO
// =====================================


function proximo(){


enviarComando(
"next"
);


}






// =====================================
// VÍDEO ANTERIOR
// =====================================


function anterior(){


enviarComando(
"previous"
);


}






// =====================================
// CONTROLE REMOTO TV
// =====================================


document.onkeydown=function(e){



switch(e.keyCode){



case 34:

// PAGE DOWN

proximo();

break;



case 33:

// PAGE UP

anterior();

break;



}



};







// =====================================
// CLIQUE NO VÍDEO
// =====================================


mediaVideo.onclick=function(){



if(mediaVideo.paused){


mediaVideo.play();


}else{


mediaVideo.pause();


}


};






</script>


</body>

</html>
