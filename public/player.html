<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">


<title>X-Stream Player V5</title>


<style>

html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,sans-serif;

}



#video{

position:fixed;

width:100%;
height:100%;

top:0;
left:0;

background:#000;

object-fit:contain;

}





#status{

position:fixed;

top:20px;
left:20px;

background:rgba(0,0,0,.75);

padding:15px 20px;

border-radius:10px;

color:white;

z-index:10;

}



#statusTitle{

font-size:22px;
font-weight:bold;

}


#statusText{

font-size:17px;

margin-top:5px;

}



#waiting{


position:fixed;

width:100%;
height:100%;

display:flex;

align-items:center;

justify-content:center;

background:#000;

color:white;

font-size:25px;

z-index:5;

}



</style>


</head>


<body>



<video

id="video"

playsinline

webkit-playsinline

preload="auto"

>

</video>




<div id="waiting">

Aguardando transmissão...

</div>




<div id="status">

<div id="statusTitle">

X-Stream

</div>


<div id="statusText">

Conectando...

</div>

</div>






<script>


// =====================================
// CONFIG
// =====================================


const servidor = "";



const video =
document.getElementById("video");



let urlAtual="";

let videoAtual=-1;

let sincronizando=false;






// =====================================
// STATUS
// =====================================


function mostrarStatus(texto){


document.getElementById(
"statusText"
).innerHTML=texto;


}






// =====================================
// BUSCAR SERVIDOR
// =====================================


function atualizar(){



fetch(
servidor+"/status"
)


.then(r=>r.json())


.then(dados=>{


processar(dados);



})

.catch(()=>{


mostrarStatus(
"Sem conexão"
);


});



}









// =====================================
// PROCESSAR ESTADO
// =====================================


function processar(dados){



if(!dados.ativo){

return;

}





let item =
dados.fila[dados.atual];



if(!item){

return;

}





// mudou vídeo


if(
item.url !== urlAtual
){


carregar(item.url);


}







// sincroniza estado


if(
dados.estado==="playing"
){


if(video.paused){

video.play()
.catch(()=>{});


}


}





if(
dados.estado==="paused"
){


if(!video.paused){

video.pause();

}


}








// sincroniza tempo somente depois


if(
video.readyState >= 2
){


let diferenca =

Math.abs(
video.currentTime -
dados.posicao
);



if(
diferenca > 5
){


video.currentTime =
dados.posicao;


}



}



}








// =====================================
// CARREGAR VÍDEO
// =====================================


function carregar(url){



urlAtual=url;



mostrarStatus(
"Carregando vídeo..."
);



video.src=url;

video.load();






video.oncanplay=function(){



document.getElementById(
"waiting"
).style.display="none";



mostrarStatus(
"Reproduzindo"
);



video.play()
.catch(()=>{});



};



}









// =====================================
// ENVIAR POSIÇÃO
// =====================================


setInterval(()=>{



if(
!video.paused &&
video.currentTime>0
){



fetch(
servidor+"/atualizar-posicao",
{


method:"POST",

headers:{

"Content-Type":
"application/json"

},


body:JSON.stringify({

posicao:
video.currentTime

})


}

);



}



},3000);








// =====================================
// CONTROLES TV
// =====================================


function comando(acao,valor){



let dados={

acao:acao

};



if(valor!==undefined){

dados.valor=valor;

}



fetch(
servidor+"/controle",
{


method:"POST",

headers:{

"Content-Type":
"application/json"

},


body:JSON.stringify(dados)


}

);



}







document.onkeydown=function(e){



switch(e.keyCode){


case 13:

comando(
video.paused ?
"play":
"pause",
video.currentTime
);

break;



case 32:

comando(
video.paused ?
"play":
"pause",
video.currentTime
);

break;



case 39:

comando(
"seek",
video.currentTime+10
);

break;



case 37:

comando(
"seek",
Math.max(
0,
video.currentTime-10
)

);

break;



case 34:

comando("next");

break;



case 33:

comando("previous");

break;



}



};







// =====================================
// INÍCIO
// =====================================


mostrarStatus(
"Conectando..."
);



atualizar();



setInterval(

atualizar,

2000

);



</script>


</body>

</html>
