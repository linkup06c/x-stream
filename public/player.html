<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>X-Stream Engine Ultra Supremo</title>

<!-- SUPORTE A STREAMING HLS (M3U8 / LIVES / IPTV) -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* =====================================
   X-STREAM ULTRA SUPREMO - TV ENGINE
   ACELERADO VIA GPU + ZERO LATÊNCIA
===================================== */
html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
}

#mediaVideo {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000; 
    object-fit: contain;
    display: none; 
    z-index: 10;
    transform: translate3d(0, 0, 0);
    will-change: transform;
    backface-visibility: hidden;
}

#mediaAudio { display: none; }

#mediaImage {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000; object-fit: contain;
    display: none; z-index: 15;
    transform: translate3d(0, 0, 0);
}

#waiting {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000; display: flex;
    align-items: center; justify-content: center;
    flex-direction: column; font-size: 28px; z-index: 5000;
}

.loader {
    width: 60px; height: 60px; border-radius: 50%;
    border: 6px solid #222; border-top-color: #00e5ff;
    animation: spin 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite; 
    margin-bottom: 25px;
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

#errorBox {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; background: #000;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; z-index: 20000;
}

#errorTitle { font-size: 40px; color: #ff3333; margin-bottom: 20px; }
#errorMessage { font-size: 22px; max-width: 80%; color: #ccc; }

#audioInfo {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; background: #000;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; z-index: 20;
}

#audioInfo:before { content: "♫"; font-size: 120px; color: #00e5ff; margin-bottom: 30px; }
#audioTitle { font-size: 32px; font-weight: bold; }

#cursorLayer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%; z-index: 99999;
    color: transparent; background: transparent;
    cursor: text;
}
</style>
</head>

<body>

<div id="cursorLayer">Texto de teste invisível</div>

<video id="mediaVideo" autoplay playsinline webkit-playsinline preload="metadata" crossorigin="anonymous"></video>
<audio id="mediaAudio" autoplay preload="metadata"></audio>
<img id="mediaImage">

<div id="audioInfo">
    <div id="audioTitle">Áudio</div>
</div>

<div id="waiting">
    <div class="loader"></div>
    <div>Aguardando transmissão...</div>
</div>

<div id="errorBox">
    <div id="errorTitle">Erro</div>
    <div id="errorMessage">Não foi possível reproduzir este formato.</div>
</div>

<script>
// =====================================
// X-STREAM ENGINE ULTRA SUPREMO
// =====================================
var mediaVideo = document.getElementById("mediaVideo");
var mediaAudio = document.getElementById("mediaAudio");
var mediaImage = document.getElementById("mediaImage");

var tipoAtual = "";
var urlAtual = "";
var ultimaURL = "";
var dadosServidor = {};
var pollTimeout = null;
var hlsPlayer = null;

(function(){
    try {
        var cursor = document.getElementById("cursorLayer");
        if(cursor) cursor.style.cursor = "text";
    }catch(e){}
})();

function esconderAguardando(){
    var box = document.getElementById("waiting");
    if(box && box.style.display !== "none") box.style.display = "none";
}

function mostrarAguardando(){
    var box = document.getElementById("waiting");
    if(box && box.style.display !== "flex") box.style.display = "flex";
}

function mostrarErro(msg){
    var box = document.getElementById("errorBox");
    if(box){
        box.style.display = "flex";
        var texto = document.getElementById("errorMessage");
        if(texto) texto.innerHTML = msg;
    }
}

// ⚡ GARBAGE COLLECTION PROFUNDO (Libera RAM instantaneamente)
function limparMidia(){
    if (hlsPlayer) {
        try {
            hlsPlayer.destroy();
            hlsPlayer = null;
        } catch(e){}
    }

    try {
        mediaVideo.pause();
        mediaVideo.removeAttribute("src");
        mediaVideo.load();
    } catch(e){}

    try {
        mediaAudio.pause();
        mediaAudio.removeAttribute("src");
        mediaAudio.load();
    } catch(e){}

    try {
        mediaImage.removeAttribute("src");
    } catch(e){}
}

function receberMidia(url){
    if(!url || url === urlAtual) return;
    urlAtual = url;
    limparMidia();
    mostrarAguardando();

    // Deteção inteligente de formato
    var urlLimpa = url.split('?')[0].toLowerCase();
    
    if (urlLimpa.endsWith('.m3u8')) {
        tentarHLS(url);
    } else {
        tentarVideo(url);
    }
}

// SUPORTE A HLS / M3U8 / LIVES / IPTV
function tentarHLS(url) {
    if (Hls.isSupported()) {
        hlsPlayer = new Hls({
            enableWorker: true,
            lowLatencyMode: true,
            backBufferLength: 30
        });
        hlsPlayer.loadSource(url);
        hlsPlayer.attachMedia(mediaVideo);
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
            tipoAtual = "video";
            mostrarVideo();
            esconderAguardando();
            iniciarVideo();
        });
        hlsPlayer.on(Hls.Events.ERROR, function(event, data) {
            if (data.fatal) {
                tentarVideo(url); // Fallback se HLS falhar
            }
        });
    } else if (mediaVideo.canPlayType('application/vnd.apple.mpegurl')) {
        // Suporte nativo para Safari/Webkit antigos
        mediaVideo.src = url;
        tentarVideo(url);
    } else {
        tentarVideo(url);
    }
}

function tentarVideo(url){
    var confirmado = false;
    mediaVideo.src = url;
    mediaVideo.load();

    function ativarVideo(){
        if(confirmado) return;
        confirmado = true;
        tipoAtual = "video";
        mostrarVideo();
        esconderAguardando();
        iniciarVideo();
    }

    mediaVideo.onloadeddata = ativarVideo;
    mediaVideo.oncanplay = ativarVideo;

    mediaVideo.onerror = function(){
        if(confirmado) return;
        tentarAudio(url);
    };
}

function tentarAudio(url){
    var confirmado = false;
    mediaAudio.src = url;
    mediaAudio.load();

    mediaAudio.oncanplay = function(){
        if(confirmado) return;
        confirmado = true; 
        tipoAtual = "audio";
        esconderAguardando(); 
        mediaAudio.play();
    };

    mediaAudio.onerror = function(){
        if(confirmado) return;
        tentarImagem(url);
    };
}

function tentarImagem(url){
    var img = new Image();
    img.onload = function(){
        tipoAtual = "image"; 
        mediaImage.src = url;
        mostrarImagem(); 
        esconderAguardando();
    };
    img.onerror = function(){ mostrarErro("Formato ou link não suportado"); };
    img.src = url;
}

function esconderTodos(){
    mediaVideo.style.display = "none";
    mediaAudio.style.display = "none";
    mediaImage.style.display = "none";
}

function mostrarVideo(){ esconderTodos(); mediaVideo.style.display = "block"; }
function mostrarImagem(){ esconderTodos(); mediaImage.style.display = "block"; }

function iniciarVideo(){
    var tentativa = mediaVideo.play();
    if(tentativa !== undefined){
        tentativa.then(function(){ 
            esconderAguardando(); 
        }).catch(function(){ 
            setTimeout(iniciarVideo, 400); 
        });
    }
}

mediaVideo.onwaiting = function() { mostrarAguardando(); };
mediaVideo.onplaying = function() { esconderAguardando(); };
mediaVideo.onplay = function() { esconderAguardando(); };
mediaAudio.onplaying = function() { esconderAguardando(); };

// =====================================
// ⚡ MOTOR DE LONG POLLING ULTRA-RESILIENTE (50ms)
// =====================================
function verificarServidor(){
    var xhr = new XMLHttpRequest();
    xhr.open("GET", "/status?t=" + Date.now(), true);

    xhr.onreadystatechange = function(){
        if(xhr.readyState === 4){
            if(xhr.status === 200){
                try{
                    var dados = JSON.parse(xhr.responseText);
                    dadosServidor = dados;

                    var url = "";
                    if(dados.fila && dados.fila.length > 0 && dados.fila[dados.atual]){
                        url = dados.fila[dados.atual].url;
                    }
                    if(!url && dados.video){ url = dados.video; }

                    if(dados.ativo && url){
                        if(url !== ultimaURL){
                            ultimaURL = url;
                            receberMidia(url);
                        }
                    } else if (!dados.ativo || (!dados.video && (!dados.fila || dados.fila.length === 0))) {
                        if(urlAtual !== ""){
                            urlAtual = ""; 
                            ultimaURL = "";
                            limparMidia(); 
                            esconderTodos(); 
                            mostrarAguardando();
                        }
                    }

                    // CONTROLE DE MIDIA COM ALTA PRECISÃO
                    if(tipoAtual === "video"){
                        if(dados.reproduzindo === false && !mediaVideo.paused){
                            mediaVideo.pause();
                        } else if(dados.reproduzindo === true && mediaVideo.paused){
                            mediaVideo.play();
                        }

                        if(dados.volume !== undefined){ mediaVideo.volume = dados.volume / 100; }
                        if(dados.mudo !== undefined){ mediaVideo.muted = dados.mudo; }

                        if(dados.seek && dados.seek !== 0){
                            var novoTempo = mediaVideo.currentTime + dados.seek;
                            if(novoTempo < 0) novoTempo = 0;
                            if(novoTempo > mediaVideo.duration) novoTempo = mediaVideo.duration;

                            mediaVideo.currentTime = novoTempo;
                            enviarComando("zerar_seek");
                        }
                    }
                }catch(e){}
            }
            
            clearTimeout(pollTimeout);
            pollTimeout = setTimeout(verificarServidor, 50);
        }
    };

    xhr.onerror = function() { 
        clearTimeout(pollTimeout);
        pollTimeout = setTimeout(verificarServidor, 1000); 
    };
    xhr.send();
}

verificarServidor();

mediaVideo.onended = function(){ enviarComando("next"); };

function enviarComando(acao){
    var xhr = new XMLHttpRequest();
    xhr.open("POST", "/controle", true);
    xhr.setRequestHeader("Content-Type", "application/json");
    xhr.send(JSON.stringify({ acao: acao }));
}

function recuperarPlayer(){ if(urlAtual){ receberMidia(urlAtual); } }
mediaVideo.onerror = function(){ setTimeout(recuperarPlayer, 1500); };
mediaAudio.onerror = function(){ setTimeout(recuperarPlayer, 1500); };
</script>

</body>
</html>
