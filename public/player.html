<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>X-Stream Player</title>


<style>


html,body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:#fff;

}




#video{


position:fixed;

top:0;
left:0;


width:100%;
height:100%;


background:#000;


object-fit:contain;


z-index:10;


}





#waiting{


position:fixed;


top:0;
left:0;


width:100%;
height:100%;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;


background:#000;


font-size:28px;


z-index:20;


}





.loader{


width:55px;

height:55px;


border-radius:50%;


border:6px solid #555;


border-top-color:#fff;


animation:girar 1s linear infinite;


margin-bottom:25px;


}



@keyframes girar{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}






#status{


position:fixed;


top:20px;

left:20px;


background:rgba(0,0,0,.75);


padding:15px 20px;


border-radius:10px;


z-index:50;


}



#titulo{


font-size:24px;


font-weight:bold;


}



#mensagem{


font-size:18px;


margin-top:5px;


}







#error{


display:none;


position:fixed;


top:0;
left:0;


width:100%;
height:100%;


background:#000;


align-items:center;


justify-content:center;


flex-direction:column;


font-size:25px;


z-index:100;


}




</style>


</head>



<body>



<video

id="video"

playsinline

webkit-playsinline

preload="auto"

>

</video>





<div id="waiting">


<div class="loader"></div>


<div>

Aguardando transmissão...

</div>


</div>







<div id="status">


<div id="titulo">

X-Stream

</div>


<div id="mensagem">

Conectando...

</div>


</div>






<div id="error">


<div>

Erro ao reproduzir

</div>


</div>





<script>


// =====================================
// CONFIGURAÇÃO
// =====================================


const servidor =

"https://x-stream-56ya.onrender.com";



const video =

document.getElementById("video");



let urlAtual="";

let indiceAtual=-1;

let ultimaPosicao=0;

let carregando=false;



// =====================================
// STATUS
// =====================================


function mostrarStatus(texto){


document.getElementById(
"mensagem"
).innerHTML=texto;


}






// =====================================
// ESCONDER AGUARDANDO
// =====================================


function pronto(){


document.getElementById(
"waiting"
).style.display="none";


}






// =====================================
// BUSCAR SERVIDOR
// =====================================


function buscarEstado(){



fetch(
servidor+"/status"
)


.then(function(res){

return res.json();

})


.then(function(dados){



receberEstado(dados);



})


.catch(function(){



mostrarStatus(
"Servidor offline"
);



});



}








// =====================================
// RECEBER ESTADO GLOBAL
// =====================================


function receberEstado(dados){



if(!dados.ativo){



mostrarStatus(
"Aguardando transmissão..."
);



return;


}





let item =

dados.fila[dados.atual];




if(!item){


return;


}







// NOVO VÍDEO


if(
urlAtual !== item.url
){



abrirVideo(
item.url
);



}







// SINCRONIZAR PLAY


if(
dados.estado === "playing"
){



if(video.paused){


video.play()

.catch(function(){});


}



}






// SINCRONIZAR PAUSE


if(
dados.estado === "paused"
){



if(!video.paused){


video.pause();


}



}






// SINCRONIZAR TEMPO


if(
video.readyState >= 2
){



let diferenca =

Math.abs(

video.currentTime -

Number(dados.posicao || 0)

);




if(
diferenca > 8
){



video.currentTime =

Number(dados.posicao);



}



}




}








// =====================================
// ABRIR VÍDEO
// =====================================


function abrirVideo(url){



if(carregando){

return;

}



carregando=true;



urlAtual=url;



mostrarStatus(
"Carregando vídeo..."
);



video.src=url;



video.load();





video.oncanplay=function(){



carregando=false;



pronto();



mostrarStatus(
"Reproduzindo"
);



video.play()

.catch(function(){



mostrarStatus(
"Aguardando reprodução..."
);



});



};





video.onerror=function(){



carregando=false;



document.getElementById(
"error"
).style.display="flex";



};




}









// =====================================
// ENVIAR POSIÇÃO PARA SERVIDOR
// =====================================


setInterval(function(){



if(
!video.paused &&
video.currentTime>0
){



fetch(

servidor+"/atualizar-posicao",

{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify({


posicao:

video.currentTime


})


}


);



}



},3000);









// =====================================
// COMANDOS
// =====================================


function enviarComando(acao,valor){



let dados={

acao:acao

};



if(valor !== undefined){


dados.valor=valor;


}




fetch(

servidor+"/controle",

{


method:"POST",


headers:{


"Content-Type":

"application/json"


},


body:JSON.stringify(dados)


}


);



}









// =====================================
// CONTROLE TV
// =====================================


document.onkeydown=function(e){



switch(e.keyCode){



// ENTER

case 13:


if(video.paused){


enviarComando(
"play"
);


}else{


enviarComando(
"pause",
video.currentTime
);


}


break;







// ESPAÇO

case 32:


if(video.paused){


enviarComando(
"play"
);


}else{


enviarComando(
"pause",
video.currentTime
);


}


break;







// DIREITA

case 39:


enviarComando(

"seek",

video.currentTime+10

);


break;







// ESQUERDA

case 37:


enviarComando(

"seek",

Math.max(
0,
video.currentTime-10
)

);


break;







// PRÓXIMO

case 34:


enviarComando(
"next"
);


break;







// ANTERIOR

case 33:


enviarComando(
"previous"
);


break;



}



};








// =====================================
// CLIQUE NO VÍDEO
// =====================================


video.onclick=function(){


if(video.paused){


enviarComando(
"play"
);


}else{


enviarComando(
"pause",
video.currentTime
);


}


};









// =====================================
// INICIALIZAÇÃO
// =====================================


mostrarStatus(
"Conectando..."
);



buscarEstado();



setInterval(

buscarEstado,

2000

);

</script>

</body>

</html>
