<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>X-Stream Player</title>

<style>

html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,sans-serif;

}

#video{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

}

#status{

position:absolute;

top:15px;
left:15px;

z-index:9999;

background:rgba(0,0,0,.7);

padding:10px 15px;

border-radius:8px;

color:#fff;

font-size:18px;

}

#playBtn{

position:absolute;

bottom:30px;

left:50%;

transform:translateX(-50%);

z-index:9999;

padding:12px 25px;

font-size:20px;

border:none;

border-radius:8px;

}

</style>

</head>

<body>


<div id="status">

Iniciando Player...

</div>


<video
id="video"
controls
playsinline
webkit-playsinline
preload="auto">
</video>


<button id="playBtn">

▶ Reproduzir

</button>



<script>

var video =
document.getElementById("video");

var statusBox =
document.getElementById("status");

var playBtn =
document.getElementById("playBtn");


var currentVideo = "";



function setStatus(txt){

statusBox.innerHTML = txt;

}



function buscarStatus(){


var xhr =
new XMLHttpRequest();


xhr.open(
"GET",
"/status",
true
);


xhr.onreadystatechange =
function(){


if(xhr.readyState == 4){


if(xhr.status == 200){


try{


var data =
JSON.parse(xhr.responseText);



if(data.ativo){



if(
data.video &&
data.video != currentVideo
){


currentVideo =
data.video;



setStatus(
"Nova transmissão encontrada"
);



video.src =
data.video;


video.load();



}



}else{


setStatus(
"Aguardando transmissão..."
);


}



}catch(e){


setStatus(
"Erro JSON"
);


}



}


}


};



xhr.send();


}



playBtn.onclick =
function(){


video.play();


};



video.onloadedmetadata =
function(){


setStatus(
"Vídeo carregado"
);


};



video.oncanplay =
function(){


setStatus(
"Pronto para reproduzir"
);


};



video.onplaying =
function(){


setStatus(
"Transmitindo"
);


};



video.onerror =
function(){


setStatus(
"Erro ao carregar vídeo"
);


};



setStatus(
"Conectando..."
);



buscarStatus();



setInterval(
buscarStatus,
3000
);


</script>

</body>
</html>
