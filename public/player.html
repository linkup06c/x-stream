<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">


<title>X-Stream Universal Player</title>


<style>

/* =====================================
   X-STREAM TV PLAYER
   VISUAL COMPATÍVEL TV / WEBVIEW
===================================== */


html,
body{

margin:0;
padding:0;

width:100%;
height:100%;

background:#000;

overflow:hidden;

font-family:Arial,Helvetica,sans-serif;

color:white;

}



/* =====================================
   VÍDEO
===================================== */


#mediaVideo{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

display:none;

z-index:10;

}





/* =====================================
   ÁUDIO
===================================== */


#mediaAudio{

display:none;

}




/* =====================================
   IMAGEM
===================================== */


#mediaImage{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

object-fit:contain;

display:none;

z-index:15;

}




/* =====================================
   TELA AGUARDANDO
===================================== */


#waiting{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:flex;


align-items:center;


justify-content:center;


flex-direction:column;


font-size:28px;


z-index:5000;


}





.loader{


width:55px;


height:55px;


border-radius:50%;


border:6px solid #555;


border-top-color:white;


animation:

spin 1s linear infinite;


margin-bottom:25px;


}




@keyframes spin{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}







/* =====================================
   ERRO
===================================== */


#errorBox{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:none;


align-items:center;


justify-content:center;


flex-direction:column;


text-align:center;


z-index:20000;


}



#errorTitle{


font-size:40px;


margin-bottom:20px;


}



#errorMessage{


font-size:22px;


max-width:80%;


}








/* =====================================
   INFORMAÇÃO DE ÁUDIO
===================================== */


#audioInfo{


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#000;


display:none;


align-items:center;


justify-content:center;


flex-direction:column;


z-index:20;


}




#audioInfo:before{


content:"♫";


font-size:120px;


margin-bottom:30px;


}





#audioTitle{


font-size:32px;


font-weight:bold;


}








/* =====================================
   COMPATIBILIDADE TV
===================================== */


button,
video,
audio,
img{


outline:none;


}



*{


-webkit-tap-highlight-color:transparent;


}


#cursorLayer{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;


z-index:99999;


/* invisível */

color:transparent;

background:transparent;


/* mantém texto */

user-select:text;

-webkit-user-select:text;

cursor:text;


/* teste primeiro SEM bloquear */

}










#cursorLayer{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;


z-index:99999;


/* invisível */

color:transparent;

background:transparent;


/* mantém texto */

user-select:text;

-webkit-user-select:text;

cursor:text;


/* teste primeiro SEM bloquear */

}
</style>

</head>
<body>
<div id="cursorLayer">

Texto de teste invisível

</div>

<!-- =====================================
     VÍDEO PRINCIPAL
===================================== -->


<video

id="mediaVideo"

autoplay

playsinline

webkit-playsinline

preload="auto"

></video>





<!-- =====================================
     ÁUDIO
===================================== -->


<audio

id="mediaAudio"

autoplay

preload="auto"

></audio>






<!-- =====================================
     IMAGEM
===================================== -->


<img

id="mediaImage"

>








<!-- =====================================
     INFORMAÇÃO ÁUDIO
===================================== -->


<div id="audioInfo">


<div id="audioTitle">

Áudio

</div>


</div>




<!-- =====================================
     AGUARDANDO
===================================== -->


<div id="waiting">


<div class="loader"></div>


<div>

Aguardando transmissão...

</div>


</div>







<!-- =====================================
     ERRO
===================================== -->


<div id="errorBox">


<div id="errorTitle">

Erro

</div>


<div id="errorMessage">

Não foi possível reproduzir.

</div>


</div>






<script>

// =====================================
// X-STREAM PLAYER ENGINE FINAL
// COMPATÍVEL TV / WEBVIEW
// =====================================


var mediaVideo =
document.getElementById("mediaVideo");


var mediaAudio =
document.getElementById("mediaAudio");


var mediaImage =
document.getElementById("mediaImage");



var tipoAtual = "";

var urlAtual = "";

var ultimaURL = "";

var dadosServidor = {};











// =====================================
// TELA AGUARDANDO
// =====================================


function esconderAguardando(){


var box =
document.getElementById("waiting");


if(box){

box.style.display="none";

}


}








// =====================================
// ERRO
// =====================================


function mostrarErro(msg){


var box =
document.getElementById("errorBox");


if(box){


box.style.display="flex";


document.getElementById(
"errorMessage"
).innerHTML=msg;


}


}








// =====================================
// LIMPAR MÍDIA
// =====================================


function limparMidia(){


try{


mediaVideo.pause();


mediaVideo.removeAttribute(
"src"
);


mediaVideo.load();


}catch(e){}





try{


mediaAudio.pause();


mediaAudio.removeAttribute(
"src"
);


mediaAudio.load();


}catch(e){}





mediaImage.removeAttribute(
"src"
);


}









// =====================================
// RECEBER NOVA MÍDIA
// =====================================


function receberMidia(url){



if(!url){

return;

}



if(url===urlAtual){

return;

}



urlAtual=url;



limparMidia();



mostrarStatus(
"X-Stream",
"Analisando mídia..."
);



tentarVideo(url);



}








// =====================================
// TENTAR VÍDEO
// =====================================


function tentarVideo(url){


var confirmado=false;



mediaVideo.src=url;


mediaVideo.load();







mediaVideo.onloadeddata=function(){


if(confirmado){

return;

}



confirmado=true;



tipoAtual="video";



mostrarVideo();



esconderAguardando();



iniciarVideo();



};








mediaVideo.oncanplay=function(){


tipoAtual="video";


mostrarVideo();


esconderAguardando();



};








mediaVideo.onplay=function(){


esconderAguardando();


};








mediaVideo.onerror=function(){



if(confirmado){

return;

}



tentarAudio(url);



};



}








// =====================================
// TENTAR ÁUDIO
// =====================================


function tentarAudio(url){


var confirmado=false;



mediaAudio.src=url;


mediaAudio.load();





mediaAudio.oncanplay=function(){


if(confirmado){

return;

}



confirmado=true;



tipoAtual="audio";



mediaAudio.play();



};





mediaAudio.onerror=function(){



if(confirmado){

return;

}



tentarImagem(url);



};



}
// =====================================
// TENTAR IMAGEM
// =====================================


function tentarImagem(url){


var img=new Image();



img.onload=function(){


tipoAtual="image";


mediaImage.src=url;


mostrarImagem();


esconderAguardando();



};



img.onerror=function(){


mostrarErro(
"Formato não suportado"
);


};



img.src=url;



}









// =====================================
// CONTROLE DE EXIBIÇÃO
// =====================================


function esconderTodos(){


mediaVideo.style.display="none";


mediaAudio.style.display="none";


mediaImage.style.display="none";


}








function mostrarVideo(){


esconderTodos();


mediaVideo.style.display="block";


}








function mostrarImagem(){


esconderTodos();


mediaImage.style.display="block";


}









// =====================================
// INICIAR VÍDEO
// =====================================


function iniciarVideo(){



var tentativa =
mediaVideo.play();




if(tentativa !== undefined){



tentativa.then(function(){


esconderStatus();


esconderAguardando();


})

.catch(function(){


setTimeout(

iniciarVideo,

1000

);



});



}



}









// =====================================
// EVENTOS DO PLAYER
// =====================================


mediaVideo.onloadeddata=function(){


esconderAguardando();


};





mediaVideo.onplaying=function(){


esconderAguardando();


esconderStatus();


};





mediaVideo.onplay=function(){


esconderAguardando();


};





mediaVideo.onwaiting=function(){


mostrarStatus(

"X-Stream",

"Carregando..."

);


};





mediaAudio.onplaying=function(){


esconderStatus();


};









// =====================================
// BUSCAR SERVIDOR
// =====================================


function verificarServidor(){


var xhr =
new XMLHttpRequest();



xhr.open(

"GET",

"/status",

true

);





xhr.onreadystatechange=function(){



if(

xhr.readyState===4 &&

xhr.status===200

){



try{


var dados =
JSON.parse(

xhr.responseText

);



dadosServidor=dados;



var url="";






// FILA NOVA


if(

dados.fila &&

dados.fila.length>0 &&

dados.fila[dados.atual]

){



url =

dados.fila[dados.atual].url;



}






// COMPATIBILIDADE ANTIGA


if(!url && dados.video){



url=dados.video;



}






if(

dados.ativo &&

url

){



if(

url!==ultimaURL

){



ultimaURL=url;



receberMidia(url);



}



}



}catch(e){



}



}



};



xhr.send();



}









// =====================================
// CONEXÃO INICIAL
// =====================================


mostrarStatus(

"X-Stream",

"Conectando..."

);



verificarServidor();



setInterval(

verificarServidor,

3000

);
// =====================================
// PRÓXIMO VÍDEO AUTOMÁTICO
// =====================================


mediaVideo.onended=function(){


    enviarComando(
        "next"
    );


};









// =====================================
// ENVIAR COMANDO SERVIDOR
// =====================================


function enviarComando(acao){


var xhr =
new XMLHttpRequest();



xhr.open(

"POST",

"/controle",

true

);



xhr.setRequestHeader(

"Content-Type",

"application/json"

);



xhr.send(

JSON.stringify({

acao:acao

})

);



}









// =====================================
// RECUPERAÇÃO AUTOMÁTICA
// =====================================


function recuperarPlayer(){



if(urlAtual){



mostrarStatus(

"X-Stream",

"Reconectando..."

);



receberMidia(

urlAtual

);



}



}








mediaVideo.onerror=function(){



mostrarStatus(

"X-Stream",

"Tentando recuperar vídeo..."

);



setTimeout(

recuperarPlayer,

3000

);



};








mediaAudio.onerror=function(){



mostrarStatus(

"X-Stream",

"Tentando recuperar áudio..."

);



setTimeout(

recuperarPlayer,

3000

);



};









// =====================================
// INTERNET
// =====================================


window.ononline=function(){



mostrarStatus(

"X-Stream",

"Internet restaurada"

);



verificarServidor();



};






window.onoffline=function(){



mostrarStatus(

"X-Stream",

"Sem conexão"

);



};









// =====================================
// CONTROLE REMOTO TV
// =====================================


document.onkeydown=function(e){



var tecla=e.keyCode;





// ENTER

if(tecla===13){



if(tipoAtual==="video"){



iniciarVideo();



}



}






// ESPAÇO PLAY / PAUSE


if(tecla===32){



if(tipoAtual==="video"){



if(mediaVideo.paused){


mediaVideo.play();



}else{


mediaVideo.pause();



}



}



}







// PAGE DOWN = PRÓXIMO


if(tecla===34){



enviarComando(

"next"

);



}







// PAGE UP = ANTERIOR


if(tecla===33){



enviarComando(

"previous"

);



}



};









// =====================================
// LIMPEZA DE MEMÓRIA TV
// =====================================


setInterval(function(){



try{



if(

mediaVideo.readyState===0 &&

tipoAtual==="video"

){



mediaVideo.load();



}



}catch(e){}



},30000);









// =====================================
// FINAL
// =====================================


mostrarStatus(

"X-Stream",

"Player pronto"

);



// =====================================
// X-STREAM TV CURSOR HIDE ENGINE
// TENTA OCULTAR PONTEIRO DO NAVEGADOR
// =====================================


(function(){


    function esconderCursor(){


        try{


            document.documentElement.style.cursor = "none";


            document.body.style.cursor = "none";



            var elementos =
            document.querySelectorAll("*");



            for(
                var i = 0;
                i < elementos.length;
                i++
            ){


                elementos[i].style.cursor="none";


            }



        }catch(e){}



    }






    // aplicar ao iniciar

    esconderCursor();






    // reaplicar periodicamente

    setInterval(function(){


        esconderCursor();


    },1000);






    // quando mexer no controle/mouse

    document.addEventListener(
        "mousemove",
        esconderCursor,
        false
    );



    document.addEventListener(
        "mousedown",
        esconderCursor,
        false
    );



    document.addEventListener(
        "touchstart",
        esconderCursor,
        false
    );



    document.addEventListener(
        "keydown",
        esconderCursor,
        false
    );






    // tenta entrar em modo fullscreen

    function fullscreen(){


        try{


            var tela =
            document.documentElement;



            if(
                tela.requestFullscreen
            ){


                tela.requestFullscreen();


            }


            else if(
                tela.webkitRequestFullscreen
            ){


                tela.webkitRequestFullscreen();


            }



        }catch(e){}



    }





    // primeira interação da TV

    document.addEventListener(
        "click",
        fullscreen,
        {
            once:true
        }
    );



})();


</script>


</body>


</html>
